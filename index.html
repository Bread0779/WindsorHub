<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windsor Hub v22.5</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #080808; color: #FFF; padding: 0; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        * { box-sizing: border-box; }
        
        /* 🚀 性能預載 */
        .donut-ring, .slot-container, .detail-item { will-change: transform; }

        .layout-wrapper { display: flex; width: 100%; min-height: 100vh; padding: 20px 0; justify-content: center; }
        .left-filler { flex: 1; min-width: 10px; } 
        .main-container { width: 380px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .right-column { flex: 1; display: flex; justify-content: flex-start; padding-left: 40px; } 
        
        .side-note { width: 320px; background: #000; border: 2px solid #FFF; border-radius: 30px; padding: 25px; position: sticky; top: 20px; height: fit-content; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #noteArea { width: 100%; height: 500px; background: transparent; border: none; color: #BBB; font-family: inherit; font-size: 14px; line-height: 1.6; outline: none; resize: none; }
        .note-title { font-size: 18px; font-weight: 900; color: #FF8C00; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }

        @media (max-width: 1100px) {
            .left-filler { display: none; }
            .layout-wrapper { flex-direction: column; align-items: center; padding-bottom: 150px; }
            .main-container, .right-column { width: 380px; }
            .right-column { padding-left: 0; margin-top: 20px; order: 10; }
            .side-note { position: static; }
        }

        /* 🛡️ 插槽系統 */
        .slot-container { width: 100%; margin-bottom: 35px; border: 2px dashed #222; border-radius: 35px; padding: 5px; position: relative; min-height: 140px; display: flex; flex-direction: column; align-items: center; }
        .slot-body { width: 100%; display: flex; justify-content: center; }
        .slot-container.active-slot { border-color: transparent; }
        .slot-label { position: absolute; top: -12px; left: 25px; background: #080808; color: #555; font-size: 10px; padding: 0 8px; font-weight: bold; }
        .slot-selector { position: absolute; top: -14px; right: 25px; background: #FF8C00; color: #000; border: none; border-radius: 6px; font-size: 11px; font-weight: 900; cursor: pointer; padding: 4px 12px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        header { text-align: center; margin: 20px 0 35px 0; width: 100%; }
        h2 { color: #FF8C00; margin: 0; font-size: 28px; letter-spacing: 6px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,140,0,0.5); }
        .hub-ctrl { background: #111; border: none; border-bottom: 2px solid #FFF; border-radius: 15px; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 25px; }
        .hub-select { background: #000; border: none; color: #FFF; font-size: 16px; font-weight: bold; outline: none; cursor: pointer; flex-grow: 1; }
        
        .orb-area { background: #000; border: 2px solid #FFF; border-radius: 30px; padding: 20px; text-align: center; overflow: hidden; width: 100%; max-width: 380px; }
        .section { background: #000; padding: 25px; border-radius: 25px; border: 2px solid #FFF; width: 100%; max-width: 380px; }
        .orb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .orb-id { font-size: 24px; font-weight: 900; }

        /* 🛡️ v21.8 經典維度控制組樣式回歸 */
        .time-ctrl-group { display: flex; gap: 5px; }
        .time-ctrl { display: flex; background: #000; border: 1px solid #FFF; border-radius: 8px; overflow: hidden; width: 140px; }
        .time-select { flex-grow: 1; background: #000; border: none; color: #FFF; padding: 8px; font-size: 12px; outline: none; cursor: pointer; text-align: center; }
        .mini-btn { background: #1a1a1a; color: #FFF; border: 1px solid #FFF; border-radius: 8px; width: 32px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .del-x { background: #1a1a1a; color: #FFF; border: none; padding: 0 8px; font-size: 12px; cursor: pointer; border-left: 1px solid #FFF; }
        
        /* 圓環與數字對中 */
        .chart-container { position: relative; width: 340px; height: 210px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
        .donut-ring { position: absolute; width: 160px; height: 160px; border-radius: 50%; background: #080808; -webkit-mask: radial-gradient(transparent 40%, black 41%); mask: radial-gradient(transparent 40%, black 41%); z-index: 5; cursor: pointer; }
        .leadline-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .chart-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center; width: 140px; cursor: pointer; pointer-events: auto; }
        .center-val { font-weight: bold; color: #39FF14; text-shadow: 0 0 10px rgba(57,255,20,0.8); font-size: 24px; transition: 0.2s; } 
        .center-val.exact-mode { font-size: 18px; color: #FFF; }

        /* 🛡️ 列表拖曳與效能優化樣式 */
        .detail-list { margin-top: 10px; text-align: left; font-size: 12px; border-top: 1px solid #333; padding-top: 10px; max-height: 250px; overflow-y: auto; scrollbar-width: none; position: relative; z-index: 25; }
        .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #111; color: #FFF; cursor: grab; background: #000; user-select: none; }
        .detail-item:active { cursor: grabbing; }
        .detail-item.dragging { opacity: 0.4; border: 1px dashed #FF8C00; }
        .item-del-btn { background: transparent; color: #FF003C; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 10px; }

        .section.edit-active { box-shadow: 0 0 25px rgba(255,255,255,0.4); border-width: 3px; }
        .mode-switch { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 8px; background: #111; color: #FFF; border: 1px solid #333; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .mode-btn.active { background: #FFF; color: #000; font-weight: bold; }
        input, #inputTag { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #FFF; border-radius: 12px; margin-bottom: 12px; font-family: monospace; outline: none; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .color-opt { height: 25px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .color-opt.active { border-color: #FFF; transform: scale(1.1); }
        .main-btn { width: 100%; padding: 16px; background: #FFF; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        
        .sync-gate { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 1px solid #333; padding: 10px 0; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        .gate-btn { background: #000; color: #FFF; border: 1px solid #FFF; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; min-width: 100px; cursor: pointer; }
        .footer { width: 100%; text-align: center; font-size: 10px; color: #444; margin-top: 50px; padding-bottom: 100px; }
        .hub-btn { background: rgba(255,255,255,0.05); color: #FFF; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 5px 10px; margin-left: 5px; cursor: pointer; }
        #physical-vault { display: none; }
    </style>
</head>
<body onclick="clearLeads(event)">

<div class="layout-wrapper">
    <div class="left-filler"></div>
    <div class="main-container">
        <header><h2>WINDSOR HUB</h2></header>
        <div class="hub-ctrl">
            <select class="hub-select" id="hubSelector" onchange="switchHub(this.value)"></select>
            <div style="display:flex">
                <button class="hub-btn" onclick="editCurrentHubName()">✎</button>
                <button class="hub-btn" onclick="addNewHub()">＋</button>
                <button class="hub-btn" style="color:#FF003C; border-color: #FF003C;" onclick="deleteCurrentHub()">🗑</button>
            </div>
        </div>

        <div class="slot-container" id="slot1">
            <span class="slot-label">POSITION 01</span>
            <select class="slot-selector" onchange="quantumSwapAssign(1, this.value)">
                <option value="none">-- 待放入 --</option>
                <option value="modA">帳本 A</option>
                <option value="modB">帳本 B</option>
                <option value="modInput">輸入項</option>
            </select>
            <div class="slot-body"></div>
        </div>

        <div class="slot-container" id="slot2">
            <span class="slot-label">POSITION 02</span>
            <select class="slot-selector" onchange="quantumSwapAssign(2, this.value)">
                <option value="none">-- 待放入 --</option>
                <option value="modA">帳本 A</option>
                <option value="modB">帳本 B</option>
                <option value="modInput">輸入項</option>
            </select>
            <div class="slot-body"></div>
        </div>

        <div class="slot-container" id="slot3">
            <span class="slot-label">POSITION 03</span>
            <select class="slot-selector" onchange="quantumSwapAssign(3, this.value)">
                <option value="none">-- 待放入 --</option>
                <option value="modA">帳本 A</option>
                <option value="modB">帳本 B</option>
                <option value="modInput">輸入項</option>
            </select>
            <div class="slot-body"></div>
        </div>
        <div class="footer">© 2026 WINDSOR SHIELD ANALYTICS<br>V22.5 PERFORMANCE PEAK</div>
    </div>

    <div class="right-column">
        <div class="side-note" onclick="event.stopPropagation()">
            <div class="note-title">STRATEGIC NOTE</div>
            <textarea id="noteArea" placeholder="隨手筆記..." oninput="saveNote()"></textarea>
        </div>
    </div>
</div>

<div id="physical-vault">
    <div class="orb-area" id="modA">
        <div class="orb-header"><span class="orb-id">A</span>
            <div class="time-ctrl-group" onclick="event.stopPropagation()">
                <div class="time-ctrl">
                    <select class="time-select" id="selA" onchange="registerActiveDim('A', this.value); updateRing('A', this.value)"><option value="">選取維度</option></select>
                    <button class="del-x" onclick="deleteDim('A')">✕</button>
                </div>
                <button class="mini-btn" onclick="renameDimension('selA')">✎</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringA" class="donut-ring" onclick="handleRingClick(event, 'A')"></div>
            <svg id="leadsA" class="leadline-layer" viewBox="0 0 340 210"></svg>
            <div class="chart-center" onclick="toggleExactMode('A', event)">
                <div style="font-size:9px;color:#666;text-transform:uppercase;margin-bottom:2px">總額</div>
                <div id="valA" class="center-val">$ 0</div>
            </div>
        </div>
        <div id="listA" class="detail-list" onclick="event.stopPropagation()"></div>
    </div>

    <div class="section" id="modInput" onclick="event.stopPropagation()">
        <div class="mode-switch">
            <button id="btnDate" class="mode-btn active" onclick="setMode('date')">日期模式</button>
            <button id="btnTag" class="mode-btn" onclick="setMode('tag')">類別模式</button>
        </div>
        <div id="dateArea"><input type="date" id="inputDate" onclick="this.showPicker()"></div>
        <div id="tagArea" style="display:none"><input type="text" id="inputTag" placeholder="類別名稱"></div>
        <input type="text" id="inputName" placeholder="項目名稱">
        <div class="color-grid" id="colorPicker"></div>
        <input type="text" id="inputAmt" placeholder="金額 / 成本">
        <input type="text" id="inputNow" placeholder="當前現值 (選填)">
        <button class="main-btn" onclick="saveData()">數據存儲</button>
    </div>

    <div class="orb-area" id="modB">
        <div class="orb-header"><span class="orb-id">B</span>
            <div class="time-ctrl-group" onclick="event.stopPropagation()">
                <div class="time-ctrl">
                    <select class="time-select" id="selB" onchange="registerActiveDim('B', this.value); updateRing('B', this.value)"><option value="">選取維度</option></select>
                    <button class="del-x" onclick="deleteDim('B')">✕</button>
                </div>
                <button class="mini-btn" onclick="renameDimension('selB')">✎</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringB" class="donut-ring" onclick="handleRingClick(event, 'B')"></div>
            <svg id="leadsB" class="leadline-layer" viewBox="0 0 340 210"></svg>
            <div class="chart-center" onclick="toggleExactMode('B', event)">
                <div style="font-size:9px;color:#666;text-transform:uppercase;margin-bottom:2px">總額</div>
                <div id="valB" class="center-val">$ 0</div>
            </div>
        </div>
        <div id="listB" class="detail-list" onclick="event.stopPropagation()"></div>
    </div>
</div>

<div class="sync-gate">
    <button class="gate-btn" onclick="importData()">數據入口 (IMPORT)</button>
    <button class="gate-btn" onclick="exportData()">數據出口 (EXPORT)</button>
</div>

<script>
    let hubs = JSON.parse(localStorage.getItem("windsorMultiverse") || '{"Main Hub": {"data": {}, "note": "", "activeA": "", "activeB": ""}}');
    let currentHubName = localStorage.getItem("windsorActiveHub") || "Main Hub";
    const palette = ["#F28695", "#FFC5BB", "#FFB6BD", "#EA7878", "#D06483", "#DCC1E0", "#D9C7EF", "#CBF1F7", "#AFD1F1", "#AF7351"];
    let selectedColor = palette[0], inputMode = 'date', showExact = { A: false, B: false };
    let ringSectors = { A: [], B: [] }, editMode = { active: false, dim: null, index: -1 };

    // 🛡️ 效能優化：全局拖曳管理（單一監聽器）
    let dragEl = null, dragIdSuffix = null;

    function handleGlobalDrag() {
        document.addEventListener('dragstart', (e) => {
            if (e.target.classList.contains('detail-item')) {
                dragEl = e.target;
                dragIdSuffix = e.target.parentElement.id.slice(-1);
                e.target.classList.add('dragging');
            }
        });

        document.addEventListener('dragend', (e) => {
            if (dragEl) {
                dragEl.classList.remove('dragging');
                saveNewOrder(dragIdSuffix);
                dragEl = null; dragIdSuffix = null;
            }
        });

        document.addEventListener('dragover', (e) => {
            if (!dragEl) return;
            e.preventDefault();
            const list = document.getElementById("list" + dragIdSuffix);
            const afterEl = getDragAfterElement(list, e.clientY);
            if (afterEl == null) list.appendChild(dragEl);
            else list.insertBefore(dragEl, afterEl);
        });
    }

    function getDragAfterElement(container, y) {
        const draggableEls = [...container.querySelectorAll('.detail-item:not(.dragging)')];
        return draggableEls.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) return { offset, element: child };
            else return closest;
        }, { offset: -Infinity }).element;
    }

    function saveNewOrder(idSuffix) {
        const dim = document.getElementById("sel" + idSuffix).value;
        if (!dim || !hubs[currentHubName].data[dim]) return;
        const listEl = document.getElementById("list" + idSuffix);
        const newOrderNames = [...listEl.querySelectorAll('.detail-item')].map(el => el.dataset.name);
        const oldData = hubs[currentHubName].data[dim];
        hubs[currentHubName].data[dim] = newOrderNames.map(name => oldData.find(i => i.name === name));
        localStorage.setItem("windsorMultiverse", JSON.stringify(hubs));
        updateRing(idSuffix, dim);
    }

    window.toggleExactMode = (id, e) => {
        e.stopPropagation(); showExact[id] = !showExact[id];
        updateRing(id, document.getElementById("sel"+id).value);
        document.getElementById("val"+id).classList.toggle('exact-mode', showExact[id]);
    };

    function quantumSwapAssign(slotNum, moduleId) {
        const vault = document.getElementById('physical-vault');
        const currentSlotBody = document.querySelector(`#slot${slotNum} .slot-body`);
        const currentModuleId = currentSlotBody.firstChild ? currentSlotBody.firstChild.id : 'none';

        if (moduleId === 'none') {
            if (currentSlotBody.firstChild) vault.appendChild(currentSlotBody.firstChild);
            document.getElementById(`slot${slotNum}`).classList.remove('active-slot'); return;
        }

        let otherSlotNum = null;
        for (let i = 1; i <= 3; i++) {
            if (i === slotNum) continue;
            if (document.querySelector(`#slot${i} .slot-selector`).value === moduleId) { otherSlotNum = i; break; }
        }

        if (otherSlotNum) {
            const otherSlotBody = document.querySelector(`#slot${otherSlotNum} .slot-body`);
            const otherSelector = document.querySelector(`#slot${otherSlotNum} .slot-selector`);
            if (currentSlotBody.firstChild) {
                otherSlotBody.appendChild(currentSlotBody.firstChild);
                otherSelector.value = currentModuleId;
                document.getElementById(`slot${otherSlotNum}`).classList.add('active-slot');
            } else {
                otherSelector.value = 'none'; document.getElementById(`slot${otherSlotNum}`).classList.remove('active-slot');
            }
        } else if (currentSlotBody.firstChild) vault.appendChild(currentSlotBody.firstChild);

        currentSlotBody.appendChild(document.getElementById(moduleId));
        document.getElementById(`slot${slotNum}`).classList.add('active-slot');

        requestAnimationFrame(() => {
            refreshSelectors();
            if (moduleId === 'modA' || currentModuleId === 'modA') {
                const v = hubs[currentHubName].activeA || ""; document.getElementById("selA").value = v; updateRing("A", v);
            }
            if (moduleId === 'modB' || currentModuleId === 'modB') {
                const v = hubs[currentHubName].activeB || ""; document.getElementById("selB").value = v; updateRing("B", v);
            }
        });
    }

    function drawLead(id, sector) {
        const svg = document.getElementById("leads" + id); svg.innerHTML = "";
        const mid = sector.start + (sector.end - sector.start) / 2, rad = (mid - 90) * (Math.PI / 180);
        const centerX = 170, centerY = 105, r1 = 85;
        const x1 = centerX + r1 * Math.cos(rad), y1 = centerY + r1 * Math.sin(rad);
        let x2 = centerX + 120 * Math.cos(rad), y2 = centerY + 120 * Math.sin(rad);
        if (Math.abs(Math.cos(rad)) < 0.5) x2 = centerX + (x1 >= centerX ? 85 : -85);
        const yLimit = 55; if (y2 > centerY + yLimit) y2 = centerY + yLimit; if (y2 < centerY - yLimit) y2 = centerY - yLimit;
        const isRight = x1 >= centerX, xLabel = isRight ? 330 : 10;
        const color = (sector.hasNow && sector.amt < sector.cost) ? "#444" : "#FFF";
        const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        line.setAttribute("points", `${x1},${y1} ${x2},${y2} ${xLabel},${y2}`);
        line.setAttribute("stroke", color); line.setAttribute("fill", "none"); 
        line.setAttribute("stroke-dasharray", "3,2"); line.setAttribute("stroke-width", "1.5");
        svg.appendChild(line);
        const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t1.setAttribute("x", xLabel); t1.setAttribute("y", y2 - 4); t1.setAttribute("fill", "#FFF");
        t1.setAttribute("font-size", "12px"); t1.setAttribute("text-anchor", isRight ? "end" : "start"); t1.textContent = sector.name; svg.appendChild(t1);
        const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t2.setAttribute("x", xLabel); t2.setAttribute("y", y2 + 10); 
        t2.setAttribute("fill", sector.amt >= sector.cost ? "#39FF14" : "#FF003C");
        t2.setAttribute("font-size", "10px"); t2.setAttribute("font-weight", "bold"); 
        t2.setAttribute("text-anchor", isRight ? "end" : "start"); t2.textContent = `$ ${sector.amt.toLocaleString()}`; svg.appendChild(t2);
        const t3 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t3.setAttribute("x", xLabel); t3.setAttribute("y", y2 + 22); t3.setAttribute("fill", "#888"); t3.setAttribute("font-size", "9px"); t3.setAttribute("text-anchor", isRight ? "end" : "start");
        t3.textContent = `${((sector.amt / sector.total) * 100).toFixed(1)}%`; svg.appendChild(t3);
    }

    window.updateRing = function(id, dim) {
        const valEl = document.getElementById("val" + id), ringEl = document.getElementById("ring" + id), listEl = document.getElementById("list" + id), svgEl = document.getElementById("leads" + id);
        if (!valEl) return;
        svgEl.innerHTML = ""; ringSectors[id] = [];
        const db = hubs[currentHubName].data || {};
        if (db[dim]) {
            const items = db[dim], dimTotal = items.reduce((sum, i) => sum + i.amt, 0);
            valEl.innerText = showExact[id] ? "$ " + dimTotal.toLocaleString() : "$ " + fmtWan(dimTotal);
            listEl.innerHTML = items.map((i, idx) => {
                const perf = (i.hasNow && i.cost > 0) ? ((i.amt - i.cost) / i.cost * 100).toFixed(1) + "%" : "-";
                return `<div class="detail-item" draggable="true" data-name="${i.name}" onclick="handleListClick('${id}', ${idx})">
                    <span style="border-left:3px solid ${i.color}; padding-left:8px; color:#FFF; font-weight:bold">${i.name}</span>
                    <b style="color:${i.amt>=i.cost?'#39FF14':'#FF003C'}">${perf}</b>
                    <b>$ ${i.amt.toLocaleString()}</b>
                    <button class="item-del-btn" onclick="event.stopPropagation(); removeItem('${dim}', ${idx}, '${id}')">✕</button>
                </div>`;
            }).join('');
            if (dimTotal === 0) { ringEl.style.background = "#080808"; return; }
            let curD = 0;
            ringEl.style.background = `conic-gradient(${items.map((i, idx) => {
                const p = (i.amt / dimTotal) * 360, s = curD, e = curD + p; curD = e;
                ringSectors[id].push({ start: s, end: e, name: i.name, cost: i.cost, amt: i.amt, color: i.color, hasNow: i.hasNow, idx, dim, total: dimTotal });
                let fc = (i.hasNow && i.amt < i.cost) ? "#222" : i.color;
                return `${fc} ${s}deg ${e - 0.8}deg, #000 ${e - 0.8}deg ${e}deg`;
            }).join(",")})`;
        } else { valEl.innerText = "$ 0"; ringEl.style.background = "#080808"; listEl.innerHTML = ""; }
    }

    window.registerActiveDim = (id, val) => { hubs[currentHubName]["active" + id] = val; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); };
    window.switchHub = (n) => { 
        const vault = document.getElementById('physical-vault');
        for(let i=1; i<=3; i++) {
            const body = document.querySelector(`#slot${i} .slot-body`);
            const sel = document.querySelector(`#slot${i} .slot-selector`);
            if (body.firstChild) vault.appendChild(body.firstChild);
            sel.value = 'none'; document.getElementById(`slot${i}`).classList.remove('active-slot');
        }
        currentHubName = n; localStorage.setItem("windsorActiveHub", n); initHubUI(); 
        document.getElementById("noteArea").value = hubs[n].note || ""; clearLeads();
    };

    function init() { 
        initColorPicker(); initHubUI(); handleGlobalDrag(); // 🛡️ 啟動高效單一監聽器
        document.getElementById("noteArea").value = hubs[currentHubName].note || ""; 
    }
    function fmtWan(val) { let n = parseFloat(val) || 0; if (Math.abs(n) >= 10000) return (n / 10000).toFixed(n % 10000 === 0 ? 0 : 1) + "萬"; return n.toLocaleString(); }
    window.safeEval = (s) => { try { return Function('"use strict"; return (' + s.replace(/[^-()\d/*+.]/g, '') + ')')(); } catch { return 0; } };
    function initColorPicker() { const g = document.getElementById("colorPicker"); g.innerHTML = palette.map(c => `<div class="color-opt" style="background:${c}" onclick="selectColor('${c}', this)"></div>`).join(''); g.children[0].classList.add("active"); }
    window.selectColor = (c, el) => { selectedColor = c; document.querySelectorAll('.color-opt').forEach(opt => { opt.classList.remove('active'); if(opt.style.backgroundColor === c || rgbToHex(opt.style.backgroundColor).toUpperCase() === c.toUpperCase()) opt.classList.add('active'); }); if(el) el.classList.add('active'); };
    function rgbToHex(rgb) { if (!rgb || rgb.startsWith("#")) return rgb; const vals = rgb.match(/\d+/g); return "#" + vals.slice(0,3).map(x => parseInt(x).toString(16).padStart(2, '0')).join(''); }
    window.setMode = (m) => { inputMode = m; document.getElementById("btnDate").classList.toggle("active", m === 'date'); document.getElementById("btnTag").classList.toggle("active", m === 'tag'); document.getElementById("dateArea").style.display = m === 'date' ? 'block' : 'none'; document.getElementById("tagArea").style.display = m === 'tag' ? 'block' : 'none'; };
    window.saveData = function() { 
        const dim = inputMode === 'date' ? document.getElementById("inputDate").value : document.getElementById("inputTag").value;
        const n = document.getElementById("inputName").value || "UNNAMED";
        const cost = safeEval(document.getElementById("inputAmt").value) || 0;
        const nowStr = document.getElementById("inputNow").value;
        const current = nowStr ? safeEval(nowStr) : cost;
        if (!dim) return;
        if (!hubs[currentHubName].data) hubs[currentHubName].data = {};
        if (!hubs[currentHubName].data[dim]) hubs[currentHubName].data[dim] = [];
        const entry = { color: selectedColor, name: n, cost, amt: current, hasNow: nowStr !== "" };
        if (editMode.active && editMode.dim === dim && editMode.index > -1) hubs[currentHubName].data[dim][editMode.index] = entry;
        else hubs[currentHubName].data[dim].push(entry);
        localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); exitEditMode(); refreshSelectors();
        updateRing("A", document.getElementById("selA").value); updateRing("B", document.getElementById("selB").value);
    }
    window.handleListClick = function(id, idx) { const sector = ringSectors[id][idx]; if (sector) activateEdit(id, sector); }
    function handleRingClick(e, id) { e.stopPropagation(); const rect = e.target.getBoundingClientRect(), centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2; let angle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI) + 90; if (angle < 0) angle += 360; const sector = ringSectors[id].find(s => angle >= s.start && angle < s.end); if (sector) activateEdit(id, sector); }
    function activateEdit(id, sector) { drawLead(id, sector); document.getElementById("modInput").classList.add("edit-active"); editMode = { active: true, dim: sector.dim, index: sector.idx }; const isD = !isNaN(Date.parse(sector.dim)) && sector.dim.includes("-"); setMode(isD ? 'date' : 'tag'); if (isD) document.getElementById("inputDate").value = sector.dim; else document.getElementById("inputTag").value = sector.dim; document.getElementById("inputName").value = sector.name; document.getElementById("inputAmt").value = sector.cost; document.getElementById("inputNow").value = sector.hasNow ? sector.amt : ""; selectColor(sector.color); }
    document.addEventListener('keydown', function(e) { if (e.key === 'Enter') { const activeEl = document.activeElement; if (activeEl.tagName === 'INPUT' && activeEl.closest('#modInput')) saveData(); } });
    window.addNewHub = () => { const n = prompt("名稱:"); if (n && !hubs[n]) { hubs[n] = {data:{}, note:"", activeA:"", activeB:""}; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); switchHub(n); } };
    window.editCurrentHubName = () => { const n = prompt("改名:", currentHubName); if (n && !hubs[n]) { hubs[n] = hubs[currentHubName]; delete hubs[currentHubName]; switchHub(n); } };
    window.deleteCurrentHub = () => { if (Object.keys(hubs).length > 1 && confirm("刪除？")) { delete hubs[currentHubName]; switchHub(Object.keys(hubs)[0]); } };
    window.removeItem = (d, i, rid) => { if (confirm("刪除？")) { hubs[currentHubName].data[d].splice(i, 1); if (!hubs[currentHubName].data[d].length) delete hubs[currentHubName].data[d]; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); refreshSelectors(); updateRing(rid, document.getElementById("sel"+rid).value); } };
    window.deleteDim = (id) => { const d = document.getElementById("sel"+id).value; if (d && confirm("刪除整天？")) { delete hubs[currentHubName].data[d]; refreshSelectors(); updateRing(id, ""); } };
    function refreshSelectors() { const dims = Object.keys(hubs[currentHubName].data || {}).sort(); ["selA", "selB"].forEach(id => { const el = document.getElementById(id); if (!el) return; const cur = el.value; el.innerHTML = "<option value=''>選取維度</option>" + dims.map(d => `<option value="${d}">${d}</option>`).join(''); el.value = hubs[currentHubName].data[cur] ? cur : ""; }); }
    window.renameDimension = (selectId) => { const oldName = document.getElementById(selectId).value; if (!oldName) return; const newName = prompt("輸入新名稱:", oldName); if (newName && newName !== oldName) { if (hubs[currentHubName].data[newName]) { alert("重複！"); return; } hubs[currentHubName].data[newName] = hubs[currentHubName].data[oldName]; delete hubs[currentHubName].data[oldName]; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); refreshSelectors(); document.getElementById(selectId).value = newName; updateRing(selectId.slice(-1), newName); } };
    function exitEditMode() { editMode = { active: false, dim: null, index: -1 }; document.getElementById("modInput").classList.remove("edit-active"); document.getElementById("inputName").value = ""; document.getElementById("inputAmt").value = ""; document.getElementById("inputNow").value = ""; }
    window.clearLeads = () => { document.getElementById("leadsA").innerHTML = ""; document.getElementById("leadsB").innerHTML = ""; exitEditMode(); };
    function initHubUI() { document.getElementById("hubSelector").innerHTML = Object.keys(hubs).map(n => `<option value="${n}" ${n===currentHubName?'selected':''}>${n}</option>`).join(''); refreshSelectors(); }
    window.exportData = () => { const s = btoa(unescape(encodeURIComponent(JSON.stringify(hubs)))); const t = document.createElement("textarea"); document.body.appendChild(t); t.value = s; t.select(); document.execCommand("copy"); document.body.removeChild(t); alert("數據複製成功"); };
    window.importData = () => { try { const c = prompt("代碼:"); if (c) { hubs = JSON.parse(decodeURIComponent(escape(atob(c)))); localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); location.reload(); } } catch { alert("無效代碼"); } };
    window.saveNote = () => { hubs[currentHubName].note = document.getElementById("noteArea").value; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); };
    window.onload = init;
</script>
</body>
</html>

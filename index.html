<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windsor Hub v10.0</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #080808; color: #FFF; padding: 15px; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 380px; margin: 0 auto; box-sizing: border-box; display: flex; flex-direction: column; }
        header { text-align: center; margin: 20px 0 35px 0; order: -3; }
        h2 { color: #FF8C00; margin: 0; font-size: 28px; letter-spacing: 6px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,140,0,0.6); }
        
        /* Main Hub 改為白框線 */
        .hub-ctrl { background: #111; border: none; border-bottom: 2px solid #FFF; border-radius: 15px; padding: 12px 20px; margin-bottom: 35px; display: flex; align-items: center; justify-content: space-between; order: -2; }
        .hub-select { background: #000; border: none; color: #FF8C00; font-size: 16px; font-weight: bold; outline: none; cursor: pointer; flex-grow: 1; }
        /* 下拉選單黑化 */
        select option { background: #000 !important; color: #FFF; }

        .draggable-mod { cursor: grab; transition: transform 0.2s; user-select: none; position: relative; z-index: 10; }
        .dragging { opacity: 0.5; transform: scale(0.98); border: 2px solid #FF8C00 !important; }
        
        .orb-area { background: #000; border: 2px solid #FFF; border-radius: 30px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .orb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .orb-id { font-size: 24px; font-weight: 900; color: #FFF; }
        
        /* 日期選單白化 + 下拉黑化 */
        .time-ctrl { display: flex; background: #000; border: 1px solid #FFF; border-radius: 8px; overflow: hidden; width: 130px; }
        .time-select { flex-grow: 1; background: #000; border: none; color: #FFF; padding: 8px; font-size: 11px; outline: none; cursor: pointer; text-align: center; }
        .del-x { background: #1a1a1a; color: #FFF; border: none; padding: 0 10px; font-size: 12px; cursor: pointer; border-left: 1px solid #FFF; }

        /* 圖表區塊高度微調以對應長引線 */
        .chart-container { position: relative; width: 340px; height: 210px; margin: 0 auto; display: flex; justify-content: center; align-items: center; left: -10px; }
        .donut-ring { position: absolute; width: 160px; height: 160px; border-radius: 50%; background: #080808; -webkit-mask: radial-gradient(transparent 40%, black 41%); mask: radial-gradient(transparent 40%, black 41%); z-index: 5; cursor: pointer; }
        .leadline-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .chart-center { z-index: 6; text-align: center; pointer-events: none; }
        .center-val { font-size: 24px; font-weight: bold; color: #39FF14; margin-top: 5px; text-shadow: 0 0 10px rgba(57,255,20,0.6); } 
        
        .detail-list { margin-top: 10px; text-align: left; font-size: 12px; border-top: 1px solid #333; padding-top: 10px; max-height: 180px; overflow-y: auto; }
        .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #111; color: #FFF; }
        .detail-item b { color: #FFF; margin-left: auto; margin-right: 12px; }
        .item-del-btn { background: transparent; color: #FF003C; border: 1px solid #333; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 10px; }

        .section { background: #000; padding: 25px; border-radius: 25px; margin-bottom: 20px; border: 2px solid #FFF; box-sizing: border-box; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #FFF; border-radius: 12px; margin-bottom: 12px; font-family: monospace; outline: none; box-sizing: border-box; }
        #inputCat { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #FFF; border-radius: 12px; margin-bottom: 12px; outline: none; box-sizing: border-box; }

        .main-btn { width: 100%; padding: 16px; background: #FF8C00; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        .footer { text-align: center; font-size: 10px; color: #444; margin: 35px 0; order: 100; }
        .hub-btn { background: rgba(255,255,255,0.05); color: #FFF; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 5px 12px; margin-left: 10px; }
    </style>
</head>
<body onclick="clearLeads(event)">
<div class="container" id="modContainer">
    <header><h2>WINDSOR HUB</h2></header>
    <div class="hub-ctrl">
        <select class="hub-select" id="hubSelector" onchange="switchHub(this.value)"></select>
        <div style="display:flex">
            <button class="hub-btn" onclick="addNewHub()">＋</button>
            <button class="hub-btn" style="color:#FF003C; border-color: #FF003C;" onclick="deleteCurrentHub()">🗑</button>
        </div>
    </div>
    
    <div class="draggable-mod orb-area" id="modA" draggable="true">
        <div class="orb-header"><span class="orb-id">● A</span>
            <div class="time-ctrl">
                <select class="time-select" id="selA" onchange="window.updateRing('A', this.value)"><option value="">選取日期</option></select>
                <button class="del-x" onclick="deleteDate('A')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringA" class="donut-ring" onclick="handleRingClick(event, 'A')"></div>
            <svg id="leadsA" class="leadline-layer" viewBox="0 0 340 210"></svg>
            <div class="chart-center">
                <div style="font-size:10px;color:#888;text-transform:uppercase">資產總額</div>
                <div id="valA" class="center-val">$ 0</div>
            </div>
        </div>
        <div id="listA" class="detail-list"></div>
    </div>

    <div class="draggable-mod section" id="modInput" draggable="true" onclick="event.stopPropagation()">
        <input type="date" id="inputDate">
        <input type="text" id="inputName" placeholder="項目名稱">
        <select id="inputCat" onchange="this.style.color = colors[this.value]">
            <option value="travel">旅遊</option>
            <option value="savings">存款</option>
            <option value="cash">活存</option>
            <option value="invest">投資</option>
            <option value="uninvested">待投資</option>
        </select>
        <input type="text" id="inputAmt" placeholder="金額 / 成本">
        <input type="text" id="inputNow" placeholder="當前現值 (選填)">
        <button class="main-btn" onclick="window.saveData()">數據存儲</button>
    </div>

    <div class="draggable-mod orb-area" id="modB" draggable="true">
        <div class="orb-header"><span class="orb-id">● B</span>
            <div class="time-ctrl">
                <select class="time-select" id="selB" onchange="window.updateRing('B', this.value)"><option value="">選取日期</option></select>
                <button class="del-x" onclick="deleteDate('B')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringB" class="donut-ring" onclick="handleRingClick(event, 'B')"></div>
            <svg id="leadsB" class="leadline-layer" viewBox="0 0 340 210"></svg>
            <div class="chart-center">
                <div style="font-size:10px;color:#888;text-transform:uppercase">資產總額</div>
                <div id="valB" class="center-val">$ 0</div>
            </div>
        </div>
        <div id="listB" class="detail-list"></div>
    </div>
    <div class="footer">© 2026 WINDSOR SHIELD ANALYTICS<br>V10.0 BORDER STRETCH</div>
</div>

<script>
    let hubs = JSON.parse(localStorage.getItem("windsorMultiverse") || '{"Main Hub": {}}');
    let currentHubName = localStorage.getItem("windsorActiveHub") || "Main Hub";
    const colors = { travel: "#2F353B", savings: "#C0C0C0", cash: "#1A1A1B", invest: "#F8F9FA", uninvested: "#47586B" };
    let ringSectors = { A: [], B: [] }, editMode = { active: false, date: null, index: -1 };

    function initDraggable() {
        document.querySelectorAll('.draggable-mod').forEach(d => {
            d.addEventListener('dragstart', (e) => {
                if (['INPUT', 'SELECT', 'BUTTON'].includes(e.target.tagName)) { e.preventDefault(); return; }
                d.classList.add('dragging');
            });
            d.addEventListener('dragend', () => { d.classList.remove('dragging'); saveOrder(); });
        });
    }
    const container = document.getElementById('modContainer');
    container.addEventListener('dragover', e => {
        e.preventDefault();
        const dragging = document.querySelector('.dragging');
        if (!dragging) return;
        const after = getAfter(container, e.clientY);
        after == null ? container.appendChild(dragging) : container.insertBefore(dragging, after);
    });
    function getAfter(c, y) {
        const els = [...c.querySelectorAll('.draggable-mod:not(.dragging)')];
        return els.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            return (offset < 0 && offset > closest.offset) ? { offset, element: child } : closest;
        }, { offset: -Infinity }).element;
    }
    function saveOrder() { localStorage.setItem('windsorModOrder', JSON.stringify([...container.querySelectorAll('.draggable-mod')].map(el => el.id))); }
    function loadOrder() { 
        const order = JSON.parse(localStorage.getItem('windsorModOrder'));
        if (order) order.forEach(id => { const el = document.getElementById(id); if (el) container.appendChild(el); });
    }
    function safeEval(str) { try { return Function('"use strict"; return (' + str.toString().replace(/[^-()\d/*+.]/g, '') + ')')(); } catch (e) { return 0; } }
    window.saveData = function() {
        const d = document.getElementById("inputDate").value, c = document.getElementById("inputCat").value, n = document.getElementById("inputName").value || "UNNAMED";
        const cost = safeEval(document.getElementById("inputAmt").value) || 0, nowValStr = document.getElementById("inputNow").value;
        const current = nowValStr ? safeEval(nowValStr) : cost, hasNow = nowValStr !== "";
        if (!d) { alert("選取日期"); return; }
        if (!hubs[currentHubName][d]) hubs[currentHubName][d] = [];
        const entry = { cat: c, name: n, cost, amt: current, hasNow };
        if (editMode.active && editMode.date === d && editMode.index > -1) { hubs[currentHubName][d][editMode.index] = entry; } 
        else { hubs[currentHubName][d].push(entry); }
        localStorage.setItem("windsorMultiverse", JSON.stringify(hubs));
        exitEditMode(); refreshSelectors();
        window.updateRing("A", document.getElementById("selA").value); window.updateRing("B", document.getElementById("selB").value);
    }
    function exitEditMode() {
        editMode = { active: false, date: null, index: -1 };
        document.getElementById("inputName").value = ""; document.getElementById("inputAmt").value = ""; document.getElementById("inputNow").value = "";
    }
    window.clearLeads = function() { document.getElementById("leadsA").innerHTML = ""; document.getElementById("leadsB").innerHTML = ""; exitEditMode(); }
    function handleRingClick(e, id) {
        e.stopPropagation();
        const rect = e.target.getBoundingClientRect(), centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
        let clickX = e.clientX, clickY = e.clientY;
        const dx = clickX - centerX, dy = clickY - centerY;
        let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
        if (angle < 0) angle += 360;
        const sector = ringSectors[id].find(s => angle >= s.start && angle < s.end);
        if (sector) {
            drawLead(id, sector);
            editMode = { active: true, date: sector.date, index: sector.idx };
            document.getElementById("inputDate").value = sector.date;
            document.getElementById("inputName").value = sector.name;
            document.getElementById("inputCat").value = sector.cat;
            document.getElementById("inputCat").style.color = colors[sector.cat];
            document.getElementById("inputAmt").value = sector.cost;
            document.getElementById("inputNow").value = sector.hasNow ? sector.amt : "";
        }
    }
    window.updateRing = function(id, date) {
        const valEl = document.getElementById("val" + id), ringEl = document.getElementById("ring" + id), listEl = document.getElementById("list" + id), svgEl = document.getElementById("leads" + id);
        svgEl.innerHTML = ""; ringSectors[id] = [];
        const db = hubs[currentHubName];
        if (db[date]) {
            const items = db[date], total = items.reduce((sum, i) => sum + i.amt, 0);
            valEl.innerText = "$ " + total.toLocaleString();
            listEl.innerHTML = items.map((i, idx) => {
                const perf = (i.hasNow && i.cost > 0) ? ((i.amt - i.cost) / i.cost * 100).toFixed(1) + "%" : "-";
                return `<div class="detail-item"><span style="border-left:3px solid ${colors[i.cat]}; padding-left:8px; color:#FFF; font-weight:bold">${i.name}</span><b style="color:${i.amt>=i.cost?'#39FF14':'#FF003C'}">${perf}</b><b>$ ${i.amt.toLocaleString()}</b><button class="item-del-btn" onclick="removeItem('${date}', ${idx}, '${id}')">✕</button></div>`;
            }).join('');
            if (total === 0) { ringEl.style.background = "#080808"; return; }
            let curD = 0;
            ringEl.style.background = `conic-gradient(${items.map((i, idx) => {
                const p = (i.amt / total) * 360, s = curD, e = curD + p; curD = e;
                ringSectors[id].push({ start: s, end: e, name: i.name, cost: i.cost, amt: i.amt, cat: i.cat, hasNow: i.hasNow, idx, date });
                let color = (i.hasNow && i.amt < i.cost) ? "#222" : colors[i.cat];
                return `${color} ${s}deg ${e - 0.8}deg, #000 ${e - 0.8}deg ${e}deg`;
            }).join(",")})`;
        } else { valEl.innerText = "$ 0"; ringEl.style.background = "#080808"; listEl.innerHTML = ""; }
    }
    
    // 🛡️ v10.0 引線重塑：極限貼邊
    function drawLead(id, sector) {
        const svg = document.getElementById("leads" + id); svg.innerHTML = "";
        const mid = sector.start + (sector.end - sector.start) / 2, rad = (mid - 90) * (Math.PI / 180);
        
        const centerX = 170, centerY = 105; // 容器寬度 340 居中
        const rStart = 85, rExt = 120; 
        
        const x1 = centerX + rStart * Math.cos(rad), y1 = centerY + rStart * Math.sin(rad);
        let x2 = centerX + rExt * Math.cos(rad), y2 = centerY + rExt * Math.sin(rad);
        
        // 垂直避讓邏輯
        const cosVal = Math.cos(rad);
        if (Math.abs(cosVal) < 0.4) { x2 = centerX + (cosVal >= 0 ? 80 : -80); }

        const isRightSide = x2 >= centerX;
        
        // 🛡️ 鎖定最外圍牆壁 (左右邊距僅留 5px)
        const xLabel = isRightSide ? 330 : 10;
        const yLabel = y2;
        const anchor = isRightSide ? "end" : "start";
        const color = (sector.hasNow && sector.amt < sector.cost) ? "#444" : "#FFF";

        const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        line.setAttribute("points", `${x1},${y1} ${x2},${y2} ${xLabel},${y2}`);
        line.setAttribute("stroke", color); line.setAttribute("fill", "none"); 
        line.setAttribute("stroke-dasharray", "3,2"); line.setAttribute("stroke-width", "1.5");
        svg.appendChild(line);
        
        const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t1.setAttribute("x", xLabel); t1.setAttribute("y", y2 - 8); t1.setAttribute("fill", "#FFFFFF"); 
        t1.setAttribute("font-size", "16px"); t1.setAttribute("font-weight", "bold"); 
        t1.setAttribute("text-anchor", anchor); t1.textContent = sector.name; svg.appendChild(t1);

        const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        const perf = (sector.hasNow && sector.cost > 0) ? `(${((sector.amt-sector.cost)/sector.cost*100).toFixed(1)}%)` : "";
        t2.setAttribute("x", xLabel); t2.setAttribute("y", y2 + 16); 
        t2.setAttribute("fill", sector.amt >= sector.cost ? "#39FF14" : "#FF003C"); 
        t2.setAttribute("font-size", "14px"); t2.setAttribute("font-weight", "bold"); 
        t2.setAttribute("text-anchor", anchor); t2.textContent = `$ ${sector.amt.toLocaleString()} ${perf}`; svg.appendChild(t2);
    }

    window.switchHub = function(n) { currentHubName = n; localStorage.setItem("windsorActiveHub", n); initHubUI(); window.updateRing("A", ""); window.updateRing("B", ""); };
    window.addNewHub = function() { const n = prompt("帳本名稱:"); if (n && !hubs[n]) { hubs[n] = {}; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); switchHub(n); } };
    window.deleteCurrentHub = function() { if (Object.keys(hubs).length > 1 && confirm("刪除？")) { delete hubs[currentHubName]; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); switchHub(Object.keys(hubs)[0]); } };
    window.removeItem = function(d, i, rid) { if (confirm("移除？")) { hubs[currentHubName][d].splice(i, 1); if (hubs[currentHubName][d].length === 0) delete hubs[currentHubName][d]; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); refreshSelectors(); window.updateRing("A", document.getElementById("selA").value); window.updateRing("B", document.getElementById("selB").value); } };
    window.deleteDate = function(id) { const d = document.getElementById("sel" + id).value; if (d && confirm("刪除整天？")) { delete hubs[currentHubName][d]; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); refreshSelectors(); window.updateRing("A", ""); window.updateRing("B", ""); } };
    function refreshSelectors() { const dts = Object.keys(hubs[currentHubName]).sort(); ["selA", "selB"].forEach(id => { const el = document.getElementById(id), cur = el.value; el.innerHTML = "<option value=''>選取日期</option>"; dts.forEach(d => { const o = document.createElement("option"); o.value = d; o.innerText = d; el.appendChild(o); }); el.value = hubs[currentHubName][cur] ? cur : ""; }); }
    function initHubUI() { const s = document.getElementById("hubSelector"); s.innerHTML = ""; Object.keys(hubs).forEach(n => { const o = document.createElement("option"); o.value = n; o.innerText = n; if (n === currentHubName) o.selected = true; s.appendChild(o); }); refreshSelectors(); }
    initDraggable(); loadOrder(); initHubUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windsor Hub v4.7</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: white; padding: 15px; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 380px; margin: 0 auto; box-sizing: border-box; display: flex; flex-direction: column; }
        .hub-ctrl { background: #111; border: 1px solid #ff8c00; border-radius: 15px; padding: 10px 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 0 15px rgba(255,140,0,0.1); order: -2; }
        .hub-select { background: transparent; border: none; color: #ff8c00; font-size: 14px; font-weight: bold; outline: none; cursor: pointer; flex-grow: 1; }
        .hub-btn { background: #222; color: #ff8c00; border: 1px solid #ff8c00; border-radius: 6px; padding: 4px 8px; font-size: 10px; cursor: pointer; margin-left: 5px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; order: -1; }
        h2 { color: #ff8c00; margin: 0; font-size: 18px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,140,0,0.3); }
        .draggable-mod { cursor: grab; transition: transform 0.2s, opacity 0.2s; user-select: none; }
        .dragging { opacity: 0.5; transform: scale(0.98); border: 2px dashed #ff8c00 !important; }
        .orb-area { background: rgba(255,140,0,0.03); border: 1px solid #222; border-radius: 25px; padding: 20px; margin-bottom: 15px; text-align: center; position: relative; }
        .orb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; pointer-events: none; }
        .orb-header * { pointer-events: auto; }
        .orb-id { font-size: 24px; font-weight: 900; color: #ff8c00; text-shadow: 0 0 12px #ff8c00; }
        .time-ctrl { display: flex; background: #222; border: 1px solid #ff8c00; border-radius: 8px; overflow: hidden; width: 140px; }
        .time-select { flex-grow: 1; background: transparent; border: none; color: #ff8c00; padding: 6px; font-size: 11px; outline: none; cursor: pointer; }
        .del-x { background: #333; color: #888; border: none; padding: 5px 10px; font-size: 14px; cursor: pointer; }
        .chart-container { position: relative; width: 260px; height: 260px; margin: 0 auto; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .donut-ring { position: absolute; width: 180px; height: 180px; border-radius: 50%; background: #222; -webkit-mask: radial-gradient(transparent 40%, black 41%); mask: radial-gradient(transparent 40%, black 41%); z-index: 5; pointer-events: auto; cursor: pointer; }
        .leadline-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .chart-center { z-index: 6; text-align: center; }
        .center-label { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .center-val { font-size: 18px; font-weight: bold; color: #39ff14; text-shadow: 0 0 5px rgba(57, 255, 20, 0.5); }
        .detail-list { margin-top: 15px; text-align: left; font-size: 10px; border-top: 1px dashed #333; padding-top: 10px; pointer-events: auto; }
        .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; color: #aaa; border-bottom: 1px solid #1a1a1a; }
        .detail-item b { color: #fff; margin-left: auto; margin-right: 10px; }
        .item-del-btn { background: transparent; color: #ff3131; border: 1px solid #444; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 10px; }
        .section { background: #1a1a1a; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #ff8c00; box-sizing: border-box; }
        input, select { width: 100%; padding: 12px; background: #262626; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 12px; font-family: monospace; font-size: 14px; box-sizing: border-box; outline: none; }
        .main-btn { width: 100%; padding: 15px; background: #ff8c00; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .footer { text-align: center; font-size: 8px; color: #444; margin: 25px 0; order: 100; }
    </style>
</head>
<body onclick="clearLeads(event)">

<div class="container" id="modContainer">
    <div class="hub-ctrl">
        <select class="hub-select" id="hubSelector" onchange="switchHub(this.value)"></select>
        <button class="hub-btn" onclick="addNewHub()">＋帳本</button>
        <button class="hub-btn" style="color:#ff3131; border-color:#ff3131;" onclick="deleteCurrentHub()">🗑</button>
    </div>

    <header><h2>WINDSOR HUB</h2></header>
    
    <div class="draggable-mod orb-area" id="modA" draggable="true">
        <div class="orb-header"><span class="orb-id">● A</span>
            <div class="time-ctrl">
                <select class="time-select" id="selA" onchange="window.updateRing('A', this.value)"><option value="">SELECT</option></select>
                <button class="del-x" onclick="deleteDate('A')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringA" class="donut-ring" onclick="event.stopPropagation()"></div>
            <svg id="leadsA" class="leadline-layer" viewBox="0 0 260 260"></svg>
            <div class="chart-center"><div class="center-label">TOTAL (VAL)</div><div id="valA" class="center-val">$ 0</div></div>
        </div>
        <div id="listA" class="detail-list"></div>
    </div>

    <div class="draggable-mod section" id="modInput" draggable="true">
        <input type="date" id="inputDate">
        <input type="text" id="inputName" placeholder="項目名稱">
        <select id="inputCat">
            <option value="travel">旅遊類 (皇家藍)</option>
            <option value="invest">投資類 (青色)</option>
            <option value="reserve">預備金 (灰色)</option>
        </select>
        <input type="text" id="inputAmt" placeholder="金額 / 成本 (10+20)">
        <input type="text" id="inputNow" placeholder="當前現值 (選填)">
        <button class="main-btn" onclick="window.saveData()">數據存儲</button>
    </div>

    <div class="draggable-mod orb-area" id="modB" draggable="true">
        <div class="orb-header"><span class="orb-id">● B</span>
            <div class="time-ctrl">
                <select class="time-select" id="selB" onchange="window.updateRing('B', this.value)"><option value="">SELECT</option></select>
                <button class="del-x" onclick="deleteDate('B')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringB" class="donut-ring" onclick="event.stopPropagation()"></div>
            <svg id="leadsB" class="leadline-layer" viewBox="0 0 260 260"></svg>
            <div class="chart-center"><div class="center-label">TOTAL (VAL)</div><div id="valB" class="center-val">$ 0</div></div>
        </div>
        <div id="listB" class="detail-list"></div>
    </div>

    <div class="footer">© 2026 WINDSOR SHIELD ANALYTICS<br>v4.7 SMART EDIT</div>
</div>

<script>
    let hubs = JSON.parse(localStorage.getItem("windsorMultiverse") || '{"Main Hub": {}}');
    let currentHubName = localStorage.getItem("windsorActiveHub") || "Main Hub";
    const colors = { travel: "#0a377d", invest: "#00f3ff", reserve: "#888" };
    let ringSectors = { A: [], B: [] };
    let editIndex = -1; // 記錄正在編輯的索引

    // --- 拖移與加載排序 ---
    const container = document.getElementById('modContainer');
    document.querySelectorAll('.draggable-mod').forEach(d => {
        d.addEventListener('dragstart', () => d.classList.add('dragging'));
        d.addEventListener('dragend', () => { d.classList.remove('dragging'); saveOrder(); });
    });
    container.addEventListener('dragover', e => {
        e.preventDefault();
        const after = getAfter(container, e.clientY);
        const dragging = document.querySelector('.dragging');
        after == null ? container.appendChild(dragging) : container.insertBefore(dragging, after);
    });
    function getAfter(container, y) {
        const els = [...container.querySelectorAll('.draggable-mod:not(.dragging)')];
        return els.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            return (offset < 0 && offset > closest.offset) ? { offset, element: child } : closest;
        }, { offset: -Infinity }).element;
    }
    function saveOrder() { localStorage.setItem('windsorModOrder', JSON.stringify([...container.querySelectorAll('.draggable-mod')].map(el => el.id))); }
    function loadOrder() { 
        const order = JSON.parse(localStorage.getItem('windsorModOrder'));
        if (order) order.forEach(id => { const el = document.getElementById(id); if (el) container.appendChild(el); });
    }

    // --- 核心邏輯 ---
    function safeEval(str) { try { return Function('"use strict"; return (' + str.toString().replace(/[^-()\d/*+.]/g, '') + ')')(); } catch (e) { return 0; } }

    window.saveData = function() {
        const d = document.getElementById("inputDate").value;
        const c = document.getElementById("inputCat").value;
        const n = document.getElementById("inputName").value || "未命名";
        const cost = safeEval(document.getElementById("inputAmt").value) || 0;
        const nowValStr = document.getElementById("inputNow").value;
        const current = nowValStr ? safeEval(nowValStr) : cost;
        const hasNow = nowValStr !== "";

        if (!d) { alert("請選擇日期"); return; }
        if (!hubs[currentHubName][d]) hubs[currentHubName][d] = [];
        
        const entry = { cat: c, name: n, cost, amt: current, hasNow };

        if (editIndex > -1) {
            hubs[currentHubName][d][editIndex] = entry;
            editIndex = -1;
        } else {
            hubs[currentHubName][d].push(entry);
        }

        localStorage.setItem("windsorMultiverse", JSON.stringify(hubs));
        refreshSelectors();
        window.updateRing("A", document.getElementById("selA").value);
        window.updateRing("B", document.getElementById("selB").value);
        alert("數據已同步");
        document.getElementById("modInput").style.boxShadow = "none";
    }

    window.updateRing = function(id, date) {
        const valEl = document.getElementById("val" + id), ringEl = document.getElementById("ring" + id), listEl = document.getElementById("list" + id), svgEl = document.getElementById("leads" + id);
        svgEl.innerHTML = ""; ringSectors[id] = [];
        const db = hubs[currentHubName];
        if (db[date]) {
            const items = db[date];
            const total = items.reduce((sum, i) => sum + i.amt, 0);
            valEl.innerText = "$ " + total.toLocaleString();
            listEl.innerHTML = items.map((i, idx) => {
                const perf = (i.hasNow && i.cost > 0) ? ((i.amt - i.cost) / i.cost * 100).toFixed(1) + "%" : "-";
                return `<div class="detail-item">
                    <span style="border-left:2px solid ${colors[i.cat]}; padding-left:5px">${i.name}</span>
                    <b style="color:${i.amt >= i.cost ? '#39ff14' : '#ff3131'}">${perf}</b>
                    <b>$ ${i.amt.toLocaleString()}</b>
                    <button class="item-del-btn" onclick="removeItem('${date}', ${idx}, '${id}')">✕</button></div>`;
            }).join('');
            if (total === 0) { ringEl.style.background = "#222"; return; }
            let curD = 0;
            ringEl.style.background = `conic-gradient(${items.map((i, idx) => {
                const p = (i.amt / total) * 360; const s = curD; const e = curD + p; curD = e;
                ringSectors[id].push({ start: s, end: e, name: i.name, cost: i.cost, amt: i.amt, cat: i.cat, hasNow: i.hasNow, idx, date });
                let color = (i.hasNow && i.amt < i.cost) ? "#333" : colors[i.cat];
                return `${color} ${s}deg ${e - 0.8}deg, #000 ${e - 0.8}deg ${e}deg`;
            }).join(",")})`;
        } else { valEl.innerText = "$ 0"; ringEl.style.background = "#222"; listEl.innerHTML = ""; }
    }

    function handleRingClick(e, id) {
        e.stopPropagation();
        const rect = e.target.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
        let clickX = e.touches ? e.touches[0].clientX : e.clientX;
        let clickY = e.touches ? e.touches[0].clientY : e.clientY;
        const dx = clickX - centerX, dy = clickY - centerY;
        let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
        if (angle < 0) angle += 360;
        const sector = ringSectors[id].find(s => angle >= s.start && angle < s.end);
        if (sector) {
            drawLead(id, sector);
            // 回填數據
            document.getElementById("inputDate").value = sector.date;
            document.getElementById("inputName").value = sector.name;
            document.getElementById("inputCat").value = sector.cat;
            document.getElementById("inputAmt").value = sector.cost;
            document.getElementById("inputNow").value = sector.hasNow ? sector.amt : "";
            editIndex = sector.idx;
            document.getElementById("modInput").style.boxShadow = "0 0 15px #ff8c00"; // 編輯高亮
        }
    }

    // 繪製引線與標籤
    function drawLead(id, sector) {
        const svg = document.getElementById("leads" + id); svg.innerHTML = "";
        const mid = sector.start + (sector.end - sector.start) / 2;
        const rad = (mid - 90) * (Math.PI / 180);
        const x1 = 130 + 90 * Math.cos(rad), y1 = 130 + 90 * Math.sin(rad);
        const x2 = 130 + 110 * Math.cos(rad), y2 = 130 + 110 * Math.sin(rad);
        const isR = x2 > 130, x3 = isR ? 250 : 10, y3 = y2;
        const color = (sector.hasNow && sector.amt < sector.cost) ? "#555" : colors[sector.cat];
        
        const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        line.setAttribute("points", `${x1},${y1} ${x2},${y2} ${x3},${y3}`);
        line.setAttribute("stroke", color); line.setAttribute("fill", "none"); line.setAttribute("stroke-dasharray", "2,2");
        svg.appendChild(line);
        
        const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t1.setAttribute("x", x3); t1.setAttribute("y", y3 - 5); t1.setAttribute("fill", color); t1.setAttribute("font-size", "10px"); t1.setAttribute("text-anchor", isR ? "end" : "start");
        t1.textContent = sector.name; svg.appendChild(t1);

        const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        const perf = (sector.hasNow && sector.cost > 0) ? `(${((sector.amt-sector.cost)/sector.cost*100).toFixed(1)}%)` : "";
        t2.setAttribute("x", x3); t2.setAttribute("y", y3 + 12); t2.setAttribute("fill", sector.amt >= sector.cost ? "#39ff14" : "#ff3131"); t2.setAttribute("font-size", "10px"); t2.setAttribute("text-anchor", isR ? "end" : "start");
        t2.textContent = `$ ${sector.amt.toLocaleString()} ${perf}`; svg.appendChild(t2);
    }

    // 基礎功能
    window.switchHub = function(name) { currentHubName = name; localStorage.setItem("windsorActiveHub", name); initHubUI(); window.updateRing("A", ""); window.updateRing("B", ""); };
    window.addNewHub = function() { const n = prompt("名稱:"); if (n && !hubs[n]) { hubs[n] = {}; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); switchHub(n); } };
    window.deleteCurrentHub = function() { if (Object.keys(hubs).length > 1 && confirm("刪除？")) { delete hubs[currentHubName]; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); switchHub(Object.keys(hubs)[0]); } };
    window.removeItem = function(d, i, rid) { if (confirm("移除？")) { hubs[currentHubName][d].splice(i, 1); if (hubs[currentHubName][d].length === 0) delete hubs[currentHubName][d]; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); refreshSelectors(); window.updateRing("A", document.getElementById("selA").value); window.updateRing("B", document.getElementById("selB").value); } };
    window.deleteDate = function(id) { const d = document.getElementById("sel" + id).value; if (d && confirm("刪除整天？")) { delete hubs[currentHubName][d]; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); refreshSelectors(); window.updateRing("A", ""); window.updateRing("B", ""); } };
    window.clearLeads = function() { document.getElementById("leadsA").innerHTML = ""; document.getElementById("leadsB").innerHTML = ""; editIndex = -1; document.getElementById("modInput").style.boxShadow = "none"; };
    function refreshSelectors() {
        const dates = Object.keys(hubs[currentHubName]).sort();
        ["selA", "selB"].forEach(id => { const el = document.getElementById(id); const cur = el.value; el.innerHTML = "<option value=''>SELECT</option>"; dates.forEach(d => { const opt = document.createElement("option"); opt.value = d; opt.innerText = d; el.appendChild(opt); }); el.value = hubs[currentHubName][cur] ? cur : ""; });
    }
    function initHubUI() { const s = document.getElementById("hubSelector"); s.innerHTML = ""; Object.keys(hubs).forEach(n => { const o = document.createElement("option"); o.value = n; o.innerText = n; if (n === currentHubName) o.selected = true; s.appendChild(o); }); refreshSelectors(); }
    ["ringA", "ringB"].forEach(rid => document.getElementById(rid).addEventListener("click", e => handleRingClick(e, rid.replace("ring", ""))));
    loadOrder(); initHubUI();
</script>
</body>
</html>

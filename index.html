<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windsor Hub v2.6</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: white; padding: 15px; margin: 0; overflow-x: hidden; }
        .container { max-width: 380px; margin: 0 auto; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { color: #ff8c00; margin: 0; font-size: 20px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,140,0,0.3); }
        
        .orb-area { background: rgba(255,140,0,0.03); border: 1px solid #222; border-radius: 25px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .orb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .time-ctrl { display: flex; background: #222; border: 1px solid #ff8c00; border-radius: 8px; overflow: hidden; width: 140px; box-sizing: border-box; }
        .time-select { flex-grow: 1; background: transparent; border: none; color: #ff8c00; padding: 6px; font-size: 11px; outline: none; cursor: pointer; width: 100%; }
        .del-x { background: #333; color: #888; border: none; padding: 5px 10px; font-size: 14px; cursor: pointer; }

        /* 極厚圓環設定：內孔縮至 40% */
        .chart-container { position: relative; width: 180px; height: 180px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
        .donut-ring { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #222; 
            -webkit-mask: radial-gradient(transparent 40%, black 41%); 
            mask: radial-gradient(transparent 40%, black 41%); 
            transition: background 0.5s ease; 
        }
        .center-val { font-size: 20px; font-weight: bold; color: #39ff14; z-index: 10; text-shadow: 0 0 5px rgba(57, 255, 20, 0.5); }

        .section { background: #1a1a1a; padding: 20px; border-radius: 20px; margin: 15px 0; border: 1px solid #ff8c00; box-sizing: border-box; }
        h4 { margin: 0 0 15px 0; font-size: 14px; color: #ff8c00; border-left: 3px solid #ff8c00; padding-left: 10px; }
        label { font-size: 10px; color: #888; display: block; margin-bottom: 5px; }
        
        input, select { 
            width: 100%; padding: 12px; background: #262626; border: 1px solid #444; color: white; 
            border-radius: 10px; margin-bottom: 12px; font-family: monospace; font-size: 14px; 
            box-sizing: border-box; display: block; outline: none; -webkit-appearance: none;
        }
        
        .main-btn { width: 100%; padding: 15px; background: #ff8c00; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .footer { text-align: center; font-size: 8px; color: #444; margin: 25px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>WINDSOR HUB</h2>
    </header>

    <div class="orb-area">
        <div class="orb-header">
            <span style="font-size:12px; font-weight:bold; color:#ff8c00">● A</span>
            <div class="time-ctrl">
                <select class="time-select" id="selA" onchange="updateRing('A', this.value)">
                    <option value="">SELECT DATE</option>
                </select>
                <button class="del-x" onclick="deleteDate('A')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringA" class="donut-ring"></div>
            <div id="valA" class="center-val">$ 0</div>
        </div>
    </div>

    <div class="section">
        <h4>數據寫入中樞</h4>
        <label>時空日期定義</label>
        <input type="date" id="inputDate">
        <label>項目說明</label>
        <input type="text" id="inputName" placeholder="說明">
        <label>類別與金額</label>
        <select id="inputCat">
            <option value="travel">旅遊類 (橘)</option>
            <option value="invest">投資類 (藍)</option>
            <option value="reserve">預備金 (灰)</option>
        </select>
        <input type="number" id="inputAmt" placeholder="0.00">
        <button class="main-btn" onclick="saveData()">執行數據存儲</button>
    </div>

    <div class="orb-area">
        <div class="orb-header">
            <span style="font-size:12px; font-weight:bold; color:#ff8c00">● B</span>
            <div class="time-ctrl">
                <select class="time-select" id="selB" onchange="updateRing('B', this.value)">
                    <option value="">SELECT DATE</option>
                </select>
                <button class="del-x" onclick="deleteDate('B')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringB" class="donut-ring"></div>
            <div id="valB" class="center-val">$ 0</div>
        </div>
    </div>

    <div class="footer">
        © 2026 WINDSOR SHIELD ANALYTICS<br>
        v2.6 MINIMAL ARMOR EDITION
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem("windsorHub_v6") || "{}");
    const colors = { travel: "#ff8c00", invest: "#00f3ff", reserve: "#888" };

    function refreshSelectors() {
        const dates = Object.keys(db).sort();
        ["selA", "selB"].forEach(id => {
            const el = document.getElementById(id);
            const current = el.value;
            el.innerHTML = "<option value=''>SELECT DATE</option>";
            dates.forEach(d => {
                const opt = document.createElement("option");
                opt.value = d; opt.innerText = d;
                el.appendChild(opt);
            });
            el.value = db[current] ? current : "";
        });
    }

    function saveData() {
        const d = document.getElementById("inputDate").value;
        const c = document.getElementById("inputCat").value;
        const a = parseFloat(document.getElementById("inputAmt").value) || 0;

        if (!d) { alert("請填寫日期"); return; }
        if (!db[d]) db[d] = [];
        
        db[d].push({ cat: c, amt: a });
        localStorage.setItem("windsorHub_v6", JSON.stringify(db));
        
        refreshSelectors();
        updateRing("A", document.getElementById("selA").value);
        updateRing("B", document.getElementById("selB").value);
    }

    function deleteDate(id) {
        const date = document.getElementById("sel" + id).value;
        if (!date) return;
        if (confirm("刪除 " + date + "?")) {
            delete db[date];
            localStorage.setItem("windsorHub_v6", JSON.stringify(db));
            refreshSelectors();
            updateRing("A", "");
            updateRing("B", "");
        }
    }

    function updateRing(id, date) {
        const valEl = document.getElementById("val" + id);
        const ringEl = document.getElementById("ring" + id);
        
        if (db[date]) {
            const items = db[date];
            const total = items.reduce((sum, i) => sum + i.amt, 0);
            valEl.innerText = "$ " + total.toLocaleString();
            
            if (total === 0) { ringEl.style.background = "#222"; return; }

            let currentDeg = 0;
            const gradientParts = items.map(item => {
                const p = (item.amt / total) * 100;
                const start = currentDeg;
                const end = currentDeg + p;
                currentDeg = end;
                // 維持精緻的 0.5% 間隙
                return `${colors[item.cat]} ${start}% ${end - 0.5}%, #000 ${end - 0.5}% ${end}%`;
            });
            ringEl.style.background = `conic-gradient(${gradientParts.join(",")})`;
        } else {
            valEl.innerText = "$ 0";
            ringEl.style.background = "#222";
        }
    }
    refreshSelectors();
</script>
</body>
</html>

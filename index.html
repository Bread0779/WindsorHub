<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windsor Hub v2.4</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: white; padding: 20px; margin: 0; overflow-x: hidden; }
        .container { max-width: 400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #ff8c00; margin: 0; font-size: 22px; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255,140,0,0.5); }
        
        .orb-area { background: rgba(255,140,0,0.03); border: 1px solid #222; border-radius: 25px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .orb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .time-ctrl { display: flex; background: #222; border: 1px solid #ff8c00; border-radius: 8px; overflow: hidden; width: 150px; }
        .time-select { flex-grow: 1; background: transparent; border: none; color: #ff8c00; padding: 6px; font-size: 11px; outline: none; cursor: pointer; }
        .del-x { background: #333; color: #888; border: none; padding: 5px 12px; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .del-x:hover { color: #ff3131; background: #444; }

        .chart-container { position: relative; width: 180px; height: 180px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
        .donut-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #222; -webkit-mask: radial-gradient(transparent 55%, black 56%); mask: radial-gradient(transparent 55%, black 56%); transition: background 0.5s ease; }
        .chart-center { text-align: center; z-index: 10; }
        .center-val { font-size: 20px; font-weight: bold; color: #39ff14; letter-spacing: 1px; }

        .section { background: #1a1a1a; padding: 25px; border-radius: 20px; margin: 20px 0; border: 1px solid #ff8c00; box-shadow: 0 0 20px rgba(255,140,0,0.1); }
        h4 { margin: 0 0 15px 0; font-size: 14px; color: #ff8c00; border-left: 3px solid #ff8c00; padding-left: 10px; }
        label { font-size: 11px; color: #888; display: block; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; background: #262626; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 15px; font-family: monospace; font-size: 14px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ff8c00; }
        
        .main-btn { width: 100%; padding: 16px; background: #ff8c00; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; letter-spacing: 1px; transition: 0.2s; }
        .main-btn:active { transform: scale(0.98); }
        .footer { text-align: center; font-size: 9px; color: #444; margin: 30px 0; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>WINDSOR HUB</h2>
    </header>

    <div class="orb-area">
        <div class="orb-header">
            <span style="font-size:11px; color:#ff8c00">● 觀測環 A</span>
            <div class="time-ctrl">
                <select class="time-select" id="selA" onchange="updateRing('A', this.value)">
                    <option value="">SELECT DATE</option>
                </select>
                <button class="del-x" onclick="deleteDate('A')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringA" class="donut-ring"></div>
            <div class="chart-center">
                <div id="valA" class="center-val">$ 0</div>
            </div>
        </div>
    </div>

    <div class="section">
        <h4>數據寫入中樞</h4>
        <label>時空日期定義</label>
        <input type="date" id="inputDate">
        <label>項目說明</label>
        <input type="text" id="inputName" placeholder="說明 (例：日本旅遊)">
        <label>類別與金額</label>
        <select id="inputCat">
            <option value="travel">旅遊類 (橘色)</option>
            <option value="invest">投資類 (藍色)</option>
            <option value="reserve">預備金 (灰色)</option>
        </select>
        <input type="number" id="inputAmt" placeholder="0.00">
        <button class="main-btn" onclick="saveData()">執行數據存儲</button>
    </div>

    <div class="orb-area">
        <div class="orb-header">
            <span style="font-size:11px; color:#ff8c00">● 觀測環 B</span>
            <div class="time-ctrl">
                <select class="time-select" id="selB" onchange="updateRing('B', this.value)">
                    <option value="">SELECT DATE</option>
                </select>
                <button class="del-x" onclick="deleteDate('B')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringB" class="donut-ring"></div>
            <div class="chart-center">
                <div id="valB" class="center-val">$ 0</div>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2026 WINDSOR SHIELD ANALYTICS<br>
        v2.4 STABLE GITHUB EDITION
    </div>
</div>

<script>
    // 初始化資料庫
    let db = JSON.parse(localStorage.getItem("windsorHub_v4") || "{}");
    const colors = { travel: "#ff8c00", invest: "#00f3ff", reserve: "#888" };

    function refreshSelectors() {
        const dates = Object.keys(db).sort();
        ["selA", "selB"].forEach(id => {
            const el = document.getElementById(id);
            const current = el.value;
            el.innerHTML = "<option value=''>SELECT DATE</option>";
            dates.forEach(d => {
                const opt = document.createElement("option");
                opt.value = d; opt.innerText = d;
                el.appendChild(opt);
            });
            if (db[current]) el.value = current;
            else el.value = "";
        });
    }

    function saveData() {
        const d = document.getElementById("inputDate").value;
        const c = document.getElementById("inputCat").value;
        const n = document.getElementById("inputName").value || "N/A";
        const a = parseFloat(document.getElementById("inputAmt").value) || 0;

        if (!d) { alert("請選擇日期"); return; }
        if (!db[d]) db[d] = [];
        
        db[d].push({ cat: c, name: n, amt: a });
        localStorage.setItem("windsorHub_v4", JSON.stringify(db));
        
        refreshSelectors();
        updateRing("A", document.getElementById("selA").value);
        updateRing("B", document.getElementById("selB").value);
        alert("數據已同步至日期：" + d);
    }

    function deleteDate(id) {
        const el = document.getElementById("sel" + id);
        const date = el.value;
        if (!date) return;
        if (confirm("確定刪除 " + date + " 的所有帳本？")) {
            delete db[date];
            localStorage.setItem("windsorHub_v4", JSON.stringify(db));
            refreshSelectors();
            updateRing("A", document.getElementById("selA").value);
            updateRing("B", document.getElementById("selB").value);
        }
    }

    function updateRing(id, date) {
        const valEl = document.getElementById("val" + id);
        const ringEl = document.getElementById("ring" + id);
        
        if (db[date]) {
            const items = db[date];
            const total = items.reduce((sum, i) => sum + i.amt, 0);
            valEl.innerText = "$ " + total.toLocaleString();
            
            if (total === 0) {
                ringEl.style.background = "#222";
                return;
            }

            let currentDeg = 0;
            const gradientParts = items.map(item => {
                const p = (item.amt / total) * 100;
                const start = currentDeg;
                const end = currentDeg + p;
                currentDeg = end;
                // 加入 1% 的黑色間隙
                return `${colors[item.cat]} ${start}% ${end - 1}%, #000 ${end - 1}% ${end}%`;
            });
            ringEl.style.background = `conic-gradient(${gradientParts.join(",")})`;
        } else {
            valEl.innerText = "$ 0";
            ringEl.style.background = "#222";
        }
    }

    // 頁面加載後執行一次初始化
    refreshSelectors();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windsor Hub v4.2</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: white; padding: 15px; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 380px; margin: 0 auto; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .hub-ctrl { background: #111; border: 1px solid #ff8c00; border-radius: 15px; padding: 10px 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; order: -1; }
        .hub-select { background: transparent; border: none; color: #ff8c00; font-size: 14px; font-weight: bold; outline: none; cursor: pointer; flex-grow: 1; }
        .hub-btn { background: #222; color: #ff8c00; border: 1px solid #ff8c00; border-radius: 6px; padding: 4px 8px; font-size: 10px; cursor: pointer; margin-left: 5px; }

        /* 模組拖移控制 */
        .draggable-mod { position: relative; margin-bottom: 15px; transition: transform 0.2s; touch-action: none; }
        .drag-handle { width: 40px; height: 4px; background: #ff8c00; border-radius: 2px; margin: 0 auto 10px auto; cursor: grab; opacity: 0.5; }
        .dragging { opacity: 0.3; transform: scale(0.95); }

        .orb-area { background: rgba(255,140,0,0.03); border: 1px solid #222; border-radius: 25px; padding: 15px 20px 20px 20px; text-align: center; }
        .orb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .orb-id { font-size: 24px; font-weight: 900; color: #ff8c00; text-shadow: 0 0 12px #ff8c00; }
        
        .time-ctrl { display: flex; background: #222; border: 1px solid #ff8c00; border-radius: 8px; overflow: hidden; width: 140px; }
        .time-select { flex-grow: 1; background: transparent; border: none; color: #ff8c00; padding: 6px; font-size: 11px; outline: none; cursor: pointer; }
        .del-x { background: #333; color: #888; border: none; padding: 5px 10px; font-size: 14px; cursor: pointer; }

        .chart-container { position: relative; width: 260px; height: 260px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
        .donut-ring { position: absolute; width: 180px; height: 180px; border-radius: 50%; background: #222; -webkit-mask: radial-gradient(transparent 40%, black 41%); mask: radial-gradient(transparent 40%, black 41%); z-index: 5; cursor: pointer; }
        .leadline-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .chart-center { z-index: 6; pointer-events: none; text-align: center; }
        .center-val { font-size: 18px; font-weight: bold; color: #39ff14; text-shadow: 0 0 5px rgba(57, 255, 20, 0.5); }
        
        .detail-list { margin-top: 15px; text-align: left; font-size: 10px; border-top: 1px dashed #333; padding-top: 10px; }
        .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; color: #aaa; border-bottom: 1px solid #1a1a1a; }
        .item-del-btn { background: transparent; color: #ff3131; border: 1px solid #444; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 10px; }

        /* 日期框絕對鎖定：還原總裁最愛布局 */
        .section { background: #1a1a1a; padding: 15px 20px 20px 20px; border-radius: 20px; border: 1px solid #ff8c00; box-sizing: border-box; width: 100%; }
        input, select { 
            width: 100%; padding: 12px; background: #262626; border: 1px solid #444; color: white; 
            border-radius: 10px; margin-bottom: 12px; font-family: monospace; font-size: 14px; 
            box-sizing: border-box; display: block; outline: none; -webkit-appearance: none; 
        }
        .main-btn { width: 100%; padding: 15px; background: #ff8c00; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .footer { text-align: center; font-size: 8px; color: #444; margin: 25px 0; order: 100; }
    </style>
</head>
<body onclick="clearLeads(event)">

<div class="container" id="modContainer">
    <div class="hub-ctrl">
        <select class="hub-select" id="hubSelector" onchange="switchHub(this.value)"></select>
        <button class="hub-btn" onclick="addNewHub()">＋</button>
    </div>

    <header style="order: 0;"><h2>WINDSOR HUB</h2></header>
    
    <div class="draggable-mod orb-area" id="modA" draggable="true">
        <div class="drag-handle"></div>
        <div class="orb-header"><span class="orb-id">● A</span>
            <div class="time-ctrl">
                <select class="time-select" id="selA" onchange="window.updateRing('A', this.value)"><option value="">SELECT</option></select>
                <button class="del-x" onclick="deleteDate('A')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringA" class="donut-ring" onclick="event.stopPropagation()"></div>
            <svg id="leadsA" class="leadline-layer" viewBox="0 0 260 260"></svg>
            <div class="chart-center"><div id="valA" class="center-val">$ 0</div></div>
        </div>
        <div id="listA" class="detail-list"></div>
    </div>

    <div class="draggable-mod section" id="modInput" draggable="true">
        <div class="drag-handle"></div>
        <input type="date" id="inputDate">
        <input type="text" id="inputName" placeholder="項目名稱">
        <select id="inputCat">
            <option value="travel">旅遊 (皇家藍)</option>
            <option value="invest">投資 (青色)</option>
            <option value="reserve">預備 (灰色)</option>
        </select>
        <input type="number" id="inputAmt" placeholder="金額">
        <button class="main-btn" onclick="window.saveData()">數據存儲</button>
    </div>

    <div class="draggable-mod orb-area" id="modB" draggable="true">
        <div class="drag-handle"></div>
        <div class="orb-header"><span class="orb-id">● B</span>
            <div class="time-ctrl">
                <select class="time-select" id="selB" onchange="window.updateRing('B', this.value)"><option value="">SELECT</option></select>
                <button class="del-x" onclick="deleteDate('B')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringB" class="donut-ring" onclick="event.stopPropagation()"></div>
            <svg id="leadsB" class="leadline-layer" viewBox="0 0 260 260"></svg>
            <div class="chart-center"><div id="valB" class="center-val">$ 0</div></div>
        </div>
        <div id="listB" class="detail-list"></div>
    </div>

    <div class="footer">© 2026 WINDSOR MASTER v4.2</div>
</div>

<script>
    let hubs = JSON.parse(localStorage.getItem("windsorMultiverse") || '{"Main": {}}');
    let currentHubName = localStorage.getItem("windsorActiveHub") || "Main";
    const colors = { travel: "#0a377d", invest: "#00f3ff", reserve: "#888" };
    let ringSectors = { A: [], B: [] };

    // --- 改進的手機拖移邏輯 ---
    const container = document.getElementById('modContainer');
    let dragSrcEl = null;

    function handleDragStart(e) {
        dragSrcEl = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
        if (e.preventDefault) e.preventDefault();
        return false;
    }

    function handleDrop(e) {
        e.stopPropagation();
        if (dragSrcEl !== this) {
            const allMods = [...container.querySelectorAll('.draggable-mod')];
            const srcIdx = allMods.indexOf(dragSrcEl);
            const targetIdx = allMods.indexOf(this);
            if (srcIdx < targetIdx) { container.insertBefore(dragSrcEl, this.nextSibling); } 
            else { container.insertBefore(dragSrcEl, this); }
            saveModuleOrder();
        }
        return false;
    }

    function handleDragEnd() { this.classList.remove('dragging'); }

    // 針對手機的 Touch 支援
    container.addEventListener('touchstart', (e) => {
        if (e.target.classList.contains('drag-handle')) {
            const mod = e.target.closest('.draggable-mod');
            mod.setAttribute('draggable', 'true');
        }
    }, {passive: true});

    document.querySelectorAll('.draggable-mod').forEach(mod => {
        mod.addEventListener('dragstart', handleDragStart);
        mod.addEventListener('dragover', handleDragOver);
        mod.addEventListener('drop', handleDrop);
        mod.addEventListener('dragend', handleDragEnd);
    });

    function saveModuleOrder() {
        const order = [...container.querySelectorAll('.draggable-mod')].map(el => el.id);
        localStorage.setItem('windsorModOrder', JSON.stringify(order));
    }

    // --- 核心邏輯 ---
    window.saveData = function() {
        const d = document.getElementById("inputDate").value;
        const c = document.getElementById("inputCat").value;
        const n = document.getElementById("inputName").value || "N/A";
        const a = parseFloat(document.getElementById("inputAmt").value) || 0;
        if (!d) return;
        if (!hubs[currentHubName][d]) hubs[currentHubName][d] = [];
        hubs[currentHubName][d].push({ cat: c, name: n, amt: a });
        localStorage.setItem("windsorMultiverse", JSON.stringify(hubs));
        refreshSelectors();
        window.updateRing("A", document.getElementById("selA").value);
        window.updateRing("B", document.getElementById("selB").value);
        alert("數據已同步");
    }

    window.updateRing = function(id, date) {
        const valEl = document.getElementById("val" + id);
        const ringEl = document.getElementById("ring" + id);
        const listEl = document.getElementById("list" + id);
        const svgEl = document.getElementById("leads" + id);
        svgEl.innerHTML = ""; ringSectors[id] = [];
        const db = hubs[currentHubName];
        if (db[date]) {
            const items = db[date];
            const total = items.reduce((sum, i) => sum + i.amt, 0);
            valEl.innerText = "$ " + total.toLocaleString();
            listEl.innerHTML = items.map((i, idx) => `<div class="detail-item"><span>${i.name}</span><b>$ ${i.amt.toLocaleString()}</b><button class="item-del-btn" onclick="removeItem('${date}', ${idx}, '${id}')">✕</button></div>`).join('');
            let curDeg = 0;
            const gps = items.map((i) => {
                const p = (i.amt / total) * 360;
                const s = curDeg; const e = curDeg + p;
                ringSectors[id].push({ start: s, end: e, name: i.name, amt: i.amt, cat: i.cat });
                curDeg = e;
                return `${colors[i.cat]} ${s}deg ${e - 0.8}deg, #000 ${e - 0.8}deg ${e}deg`;
            });
            ringEl.style.background = `conic-gradient(${gps.join(",")})`;
        } else { valEl.innerText = "$ 0"; ringEl.style.background = "#222"; listEl.innerHTML = ""; }
    }

    function refreshSelectors() {
        const db = hubs[currentHubName];
        const dates = Object.keys(db).sort();
        ["selA", "selB"].forEach(id => {
            const el = document.getElementById(id);
            const cur = el.value;
            el.innerHTML = "<option value=''>SELECT</option>";
            dates.forEach(d => {
                const o = document.createElement("option"); o.value = d; o.innerText = d; el.appendChild(o);
            });
            el.value = db[cur] ? cur : "";
        });
    }

    window.removeItem = function(date, index, id) {
        if (!confirm("移除？")) return;
        hubs[currentHubName][date].splice(index, 1);
        if (hubs[currentHubName][date].length === 0) delete hubs[currentHubName][date];
        localStorage.setItem("windsorMultiverse", JSON.stringify(hubs));
        refreshSelectors(); window.updateRing("A", document.getElementById("selA").value); window.updateRing("B", document.getElementById("selB").value);
    };

    window.deleteDate = function(id) {
        const d = document.getElementById("sel" + id).value;
        if (!d || !confirm("刪除全天？")) return;
        delete hubs[currentHubName][d];
        localStorage.setItem("windsorMultiverse", JSON.stringify(hubs));
        refreshSelectors(); window.updateRing("A", ""); window.updateRing("B", "");
    };

    window.clearLeads = () => { document.getElementById("leadsA").innerHTML = ""; document.getElementById("leadsB").innerHTML = ""; };

    function handleRingClick(e, id) {
        e.stopPropagation();
        const rect = e.target.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
        let cX = e.touches ? e.touches[0].clientX : e.clientX, cY = e.touches ? e.touches[0].clientY : e.clientY;
        let angle = Math.atan2(cY - centerY, cX - centerX) * (180 / Math.PI) + 90;
        if (angle < 0) angle += 360;
        const s = ringSectors[id].find(s => angle >= s.start && angle < s.end);
        if (s) drawLeadLine(id, s);
    }

    function drawLeadLine(id, s) {
        const svg = document.getElementById("leads" + id); svg.innerHTML = "";
        const mid = s.start + (s.end - s.start) / 2;
        const rad = (mid - 90) * (Math.PI / 180);
        const x1 = 130 + 90 * Math.cos(rad), y1 = 130 + 90 * Math.sin(rad);
        const x2 = 130 + 110 * Math.cos(rad), y2 = 130 + 110 * Math.sin(rad);
        const isR = x2 > 130, x3 = isR ? 250 : 10, y3 = y2, c = colors[s.cat];
        svg.innerHTML = `<polyline points="${x1},${y1} ${x2},${y2} ${x3},${y3}" stroke="${c}" fill="none" stroke-dasharray="2,2"/><text x="${x3}" y="${y3-5}" fill="${c}" font-size="10" font-weight="bold" text-anchor="${isR?'start':'end'}">${s.name}</text><text x="${x3}" y="${y3+12}" fill="#39ff14" font-size="10" text-anchor="${isR?'start':'end'}">$ ${s.amt.toLocaleString()}</text>`;
    }

    ["ringA", "ringB"].forEach(rid => {
        const el = document.getElementById(rid);
        el.addEventListener("click", (e) => handleRingClick(e, rid.replace("ring", "")));
        el.addEventListener("touchstart", (e) => handleRingClick(e, rid.replace("ring", "")));
    });

    const savedOrder = JSON.parse(localStorage.getItem('windsorModOrder'));
    if (savedOrder) savedOrder.forEach(id => container.appendChild(document.getElementById(id)));
    refreshSelectors();
</script>
</body>
</html>

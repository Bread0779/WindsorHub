<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windsor Hub v15.8</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #080808; color: #FFF; padding: 0; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* 佈局結構 */
        .layout-wrapper { display: flex; width: 100%; min-height: 100vh; padding: 20px 0; justify-content: center; box-sizing: border-box; }
        .left-filler { flex: 1; min-width: 10px; pointer-events: none; } 
        .main-container { width: 380px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; z-index: 10; min-height: 100vh; position: relative; }
        .right-column { flex: 1; display: flex; justify-content: flex-start; padding-left: 30px; } 
        
        .side-note { width: 320px; background: #000; border: 2px solid #FFF; border-radius: 30px; padding: 25px; box-sizing: border-box; position: sticky; top: 20px; height: fit-content; transition: 0.3s; }
        .side-note:focus-within { box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .note-title { font-size: 18px; font-weight: 900; color: #FF8C00; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        #noteArea { width: 100%; height: 500px; background: transparent; border: none; color: #BBB; font-family: inherit; font-size: 14px; line-height: 1.6; outline: none; resize: none; }

        @media (max-width: 1100px) {
            .left-filler { display: none; }
            .right-column { justify-content: center; padding-left: 0; width: 100%; }
            .layout-wrapper { flex-direction: column; align-items: center; padding-bottom: 150px; }
            .side-note { width: 380px; position: static; margin-top: 20px; order: 10; }
            #noteArea { height: 250px; }
        }

        header { text-align: center; margin: 20px 0 35px 0; width: 100%; pointer-events: none; }
        h2 { color: #FF8C00; margin: 0; font-size: 28px; letter-spacing: 6px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,140,0,0.5); }
        
        /* 🛡️ 物理拖曳樣式 */
        .draggable-mod { width: 100%; position: relative; margin-bottom: 25px; box-sizing: border-box; cursor: grab; transition: transform 0.2s, box-shadow 0.2s; }
        .draggable-mod:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.3; transform: scale(0.9); border: 2px dashed #FF8C00 !important; }
        
        .hub-ctrl { background: #111; border: none; border-bottom: 2px solid #FFF; border-radius: 15px; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
        .hub-select { background: #000; border: none; color: #FFF; font-size: 16px; font-weight: bold; outline: none; cursor: pointer; flex-grow: 1; }
        
        .orb-area { background: #000; border: 2px solid #FFF; border-radius: 30px; padding: 20px; text-align: center; overflow: hidden; }
        .orb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; pointer-events: none; }
        .orb-id { font-size: 24px; font-weight: 900; color: #FFF; }
        
        .time-ctrl-group { display: flex; gap: 5px; pointer-events: auto; }
        .time-ctrl { display: flex; background: #000; border: 1px solid #FFF; border-radius: 8px; overflow: hidden; width: 140px; }
        .time-select { flex-grow: 1; background: #000; border: none; color: #FFF; padding: 8px; font-size: 12px; outline: none; cursor: pointer; text-align: center; }
        .mini-btn { background: #1a1a1a; color: #FFF; border: 1px solid #FFF; border-radius: 8px; width: 32px; cursor: pointer; font-size: 12px; }
        .del-x { background: #1a1a1a; color: #FFF; border: none; padding: 0 8px; font-size: 12px; cursor: pointer; border-left: 1px solid #FFF; }
        
        .chart-container { position: relative; width: 340px; height: 210px; margin: 0 auto; display: flex; justify-content: center; align-items: center; left: -10px; pointer-events: none; }
        .donut-ring { position: absolute; width: 160px; height: 160px; border-radius: 50%; background: #080808; -webkit-mask: radial-gradient(transparent 40%, black 41%); mask: radial-gradient(transparent 40%, black 41%); z-index: 5; cursor: pointer; pointer-events: auto; }
        .leadline-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .chart-center { z-index: 15; text-align: center; pointer-events: none; width: 130px; position: relative; }
        .center-val { font-weight: bold; color: #39FF14; margin-top: 5px; text-shadow: 0 0 10px rgba(57,255,20,0.8); white-space: nowrap; font-size: 24px; } 
        
        .detail-list { margin-top: 10px; text-align: left; font-size: 12px; border-top: 1px solid #333; padding-top: 10px; max-height: 180px; overflow-y: auto; scrollbar-width: none; position: relative; z-index: 20; pointer-events: auto; }
        .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #111; color: #FFF; cursor: pointer; }
        .item-del-btn { background: transparent; color: #FF003C; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 10px; position: relative; z-index: 21; }
        
        .section { background: #000; padding: 25px; border-radius: 25px; border: 2px solid #FFF; transition: 0.4s ease; box-sizing: border-box; pointer-events: auto; }
        .section.edit-active { box-shadow: 0 0 25px rgba(255,255,255,0.5); border-width: 3px; }
        
        .mode-switch { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 8px; background: #111; color: #FFF; border: 1px solid #333; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .mode-btn.active { background: #FFF; color: #000; font-weight: bold; }
        
        input, #inputTag { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #FFF; border-radius: 12px; margin-bottom: 12px; font-family: monospace; outline: none; box-sizing: border-box; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .color-opt { height: 25px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .color-opt.active { border-color: #FFF; transform: scale(1.1); }
        
        .main-btn { width: 100%; padding: 16px; background: #FFF; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        .sync-gate { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 1px solid #333; padding: 10px 0; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        .gate-btn { background: #000; color: #FFF; border: 1px solid #FFF; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; min-width: 100px; cursor: pointer; }
        
        .footer { width: 100%; text-align: center; font-size: 10px; color: #444; margin-top: 50px; padding-bottom: 100px; pointer-events: none; }
        .hub-btn { background: rgba(255,255,255,0.05); color: #FFF; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 5px 10px; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body onclick="clearLeads(event)">

<div class="layout-wrapper">
    <div class="left-filler"></div>

    <div class="main-container" id="modContainer">
        <header><h2>WINDSOR HUB</h2></header>
        
        <div class="draggable-mod" id="modHub">
            <div class="hub-ctrl" onclick="event.stopPropagation()">
                <select class="hub-select" id="hubSelector" onchange="switchHub(this.value)"></select>
                <div style="display:flex">
                    <button class="hub-btn" onclick="editCurrentHubName()">✎</button>
                    <button class="hub-btn" onclick="addNewHub()">＋</button>
                    <button class="hub-btn" style="color:#FF003C; border-color: #FF003C;" onclick="deleteCurrentHub()">🗑</button>
                </div>
            </div>
        </div>
        
        <div class="draggable-mod" id="modA">
            <div class="orb-area">
                <div class="orb-header">
                    <span class="orb-id">A</span>
                    <div class="time-ctrl-group" onclick="event.stopPropagation()">
                        <div class="time-ctrl">
                            <select class="time-select" id="selA" onchange="updateRing('A', this.value)"><option value="">選取維度</option></select>
                            <button class="del-x" onclick="deleteDim('A')">✕</button>
                        </div>
                        <button class="mini-btn" onclick="renameDimension('selA')">✎</button>
                    </div>
                </div>
                <div class="chart-container">
                    <div id="ringA" class="donut-ring" onclick="handleRingClick(event, 'A')"></div>
                    <svg id="leadsA" class="leadline-layer" viewBox="0 0 340 210"></svg>
                    <div class="chart-center">
                        <div style="font-size:10px;color:#888;text-transform:uppercase">總額</div>
                        <div id="valA" class="center-val">$ 0</div>
                    </div>
                </div>
                <div id="listA" class="detail-list" onclick="event.stopPropagation()"></div>
            </div>
        </div>

        <div class="draggable-mod" id="modInput">
            <div class="section" onclick="event.stopPropagation()">
                <div class="mode-switch">
                    <button id="btnDate" class="mode-btn active" onclick="setMode('date')">日期模式</button>
                    <button id="btnTag" class="mode-btn" onclick="setMode('tag')">類別模式</button>
                </div>
                <div id="dateArea"><input type="date" id="inputDate"></div>
                <div id="tagArea" style="display:none"><input type="text" id="inputTag" placeholder="類別名稱"></div>
                <input type="text" id="inputName" placeholder="項目名稱">
                <div class="color-grid" id="colorPicker"></div>
                <input type="text" id="inputAmt" placeholder="金額 / 成本">
                <input type="text" id="inputNow" placeholder="當前現值 (選填)">
                <button class="main-btn" onclick="saveData()">數據存儲</button>
            </div>
        </div>

        <div class="draggable-mod" id="modB">
            <div class="orb-area">
                <div class="orb-header">
                    <span class="orb-id">B</span>
                    <div class="time-ctrl-group" onclick="event.stopPropagation()">
                        <div class="time-ctrl">
                            <select class="time-select" id="selB" onchange="updateRing('B', this.value)"><option value="">選取維度</option></select>
                            <button class="del-x" onclick="deleteDim('B')">✕</button>
                        </div>
                        <button class="mini-btn" onclick="renameDimension('selB')">✎</button>
                    </div>
                </div>
                <div class="chart-container">
                    <div id="ringB" class="donut-ring" onclick="handleRingClick(event, 'B')"></div>
                    <svg id="leadsB" class="leadline-layer" viewBox="0 0 340 210"></svg>
                    <div class="chart-center">
                        <div style="font-size:10px;color:#888;text-transform:uppercase">總額</div>
                        <div id="valB" class="center-val">$ 0</div>
                    </div>
                </div>
                <div id="listB" class="detail-list" onclick="event.stopPropagation()"></div>
            </div>
        </div>
        
        <div class="footer">© 2026 WINDSOR SHIELD ANALYTICS<br>V15.8 PHYSICS ENGINE</div>
    </div>

    <div class="right-column">
        <div class="side-note" onclick="event.stopPropagation()">
            <div class="note-title">STRATEGIC NOTE</div>
            <textarea id="noteArea" placeholder="隨手筆記..." oninput="saveNote()"></textarea>
        </div>
    </div>
</div>

<div class="sync-gate">
    <button class="gate-btn" onclick="importData()">數據入口 (IMPORT)</button>
    <button class="gate-btn" onclick="exportData()">數據出口 (EXPORT)</button>
</div>

<!-- 🛡️ 引入物理排序引擎 -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>
    let hubs = JSON.parse(localStorage.getItem("windsorMultiverse") || '{"Main Hub": {"data": {}, "note": ""}}');
    let currentHubName = localStorage.getItem("windsorActiveHub") || "Main Hub";
    const palette = ["#F28695", "#FFC5BB", "#FFB6BD", "#EA7878", "#D06483", "#DCC1E0", "#D9C7EF", "#CBF1F7", "#AFD1F1", "#AF7351"];
    let selectedColor = palette[0], inputMode = 'date';
    let ringSectors = { A: [], B: [] }, editMode = { active: false, dim: null, index: -1 };

    function init() {
        initColorPicker(); initHubUI(); initPhysicsDrag(); loadOrder();
        document.getElementById("noteArea").value = hubs[currentHubName].note || "";
    }

    // 🛡️ 物理排序引擎初始化 (取代 draggable="true")
    function initPhysicsDrag() {
        const container = document.getElementById('modContainer');
        Sortable.create(container, {
            animation: 350,
            ghostClass: 'sortable-ghost',
            filter: 'input, button, select, textarea, .time-ctrl-group, header', // 排除這些元素觸發拖曳
            preventOnFilter: false,
            onEnd: function() {
                saveOrder();
            }
        });
    }

    window.renameDimension = (selectId) => {
        const oldName = document.getElementById(selectId).value;
        if (!oldName) { alert("選取要更名的維度！"); return; }
        const newName = prompt("輸入新名稱:", oldName);
        if (newName && newName !== oldName) {
            if (hubs[currentHubName].data[newName]) { alert("名稱重複！"); return; }
            hubs[currentHubName].data[newName] = hubs[currentHubName].data[oldName];
            delete hubs[currentHubName].data[oldName];
            localStorage.setItem("windsorMultiverse", JSON.stringify(hubs));
            refreshSelectors();
            document.getElementById(selectId).value = newName;
            updateRing(selectId.slice(-1), newName);
        }
    };

    window.saveNote = () => {
        hubs[currentHubName].note = document.getElementById("noteArea").value;
        localStorage.setItem("windsorMultiverse", JSON.stringify(hubs));
    };

    function fmtWan(val) {
        let n = parseFloat(val) || 0;
        if (Math.abs(n) >= 10000) return (n / 10000).toFixed(n % 10000 === 0 ? 0 : 1) + "萬";
        return n.toLocaleString();
    }

    function initColorPicker() {
        const g = document.getElementById("colorPicker");
        g.innerHTML = palette.map(c => `<div class="color-opt" style="background:${c}" onclick="selectColor('${c}', this)"></div>`).join('');
        g.children[0].classList.add("active");
    }
    
    window.selectColor = (c, el) => {
        selectedColor = c;
        document.querySelectorAll('.color-opt').forEach(opt => {
            opt.classList.remove('active');
            const bg = opt.style.backgroundColor;
            if(bg === c || rgbToHex(bg).toUpperCase() === c.toUpperCase()) opt.classList.add('active');
        });
        if(el) el.classList.add('active');
    };

    function rgbToHex(rgb) {
        if (!rgb || rgb.startsWith("#")) return rgb;
        const vals = rgb.match(/\d+/g);
        return "#" + vals.slice(0,3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
    }

    window.setMode = (m) => {
        inputMode = m;
        document.getElementById("btnDate").classList.toggle("active", m === 'date');
        document.getElementById("btnTag").classList.toggle("active", m === 'tag');
        document.getElementById("dateArea").style.display = m === 'date' ? 'block' : 'none';
        document.getElementById("tagArea").style.display = m === 'tag' ? 'block' : 'none';
    };

    window.saveData = function() {
        const dim = inputMode === 'date' ? document.getElementById("inputDate").value : document.getElementById("inputTag").value;
        const n = document.getElementById("inputName").value || "UNNAMED";
        const cost = safeEval(document.getElementById("inputAmt").value) || 0;
        const nowStr = document.getElementById("inputNow").value;
        const current = nowStr ? safeEval(nowStr) : cost;
        if (!dim) { alert("請輸入維度"); return; }
        if (!hubs[currentHubName].data) hubs[currentHubName].data = {};
        if (!hubs[currentHubName].data[dim]) hubs[currentHubName].data[dim] = [];
        const entry = { color: selectedColor, name: n, cost, amt: current, hasNow: nowStr !== "" };
        if (editMode.active && editMode.dim === dim && editMode.index > -1) hubs[currentHubName].data[dim][editMode.index] = entry;
        else hubs[currentHubName].data[dim].push(entry);
        localStorage.setItem("windsorMultiverse", JSON.stringify(hubs));
        exitEditMode(); refreshSelectors();
        updateRing("A", document.getElementById("selA").value); updateRing("B", document.getElementById("selB").value);
    }

    window.updateRing = function(id, dim) {
        const valEl = document.getElementById("val" + id), ringEl = document.getElementById("ring" + id), listEl = document.getElementById("list" + id), svgEl = document.getElementById("leads" + id);
        svgEl.innerHTML = ""; ringSectors[id] = [];
        const db = hubs[currentHubName].data || {};
        if (db[dim]) {
            const items = db[dim], dimTotal = items.reduce((sum, i) => sum + i.amt, 0);
            valEl.innerText = "$ " + fmtWan(dimTotal);
            listEl.innerHTML = items.map((i, idx) => {
                const perf = (i.hasNow && i.cost > 0) ? ((i.amt - i.cost) / i.cost * 100).toFixed(1) + "%" : "-";
                return `<div class="detail-item" onclick="handleListClick('${id}', ${idx})"><span style="border-left:3px solid ${i.color}; padding-left:8px; color:#FFF; font-weight:bold">${i.name}</span><b style="color:${i.amt>=i.cost?'#39FF14':'#FF003C'}">${perf}</b><b>$ ${i.amt.toLocaleString()}</b><button class="item-del-btn" onclick="event.stopPropagation(); removeItem('${dim}', ${idx}, '${id}')">✕</button></div>`;
            }).join('');
            if (dimTotal === 0) { ringEl.style.background = "#080808"; return; }
            let curD = 0;
            ringEl.style.background = `conic-gradient(${items.map((i, idx) => {
                const p = (i.amt / dimTotal) * 360, s = curD, e = curD + p; curD = e;
                ringSectors[id].push({ start: s, end: e, name: i.name, cost: i.cost, amt: i.amt, color: i.color, hasNow: i.hasNow, idx, dim, total: dimTotal });
                let finalColor = (i.hasNow && i.amt < i.cost) ? "#222" : i.color;
                return `${finalColor} ${s}deg ${e - 0.8}deg, #000 ${e - 0.8}deg ${e}deg`;
            }).join(",")})`;
        } else { valEl.innerText = "$ 0"; ringEl.style.background = "#080808"; listEl.innerHTML = ""; }
    }

    function drawLead(id, sector) {
        const svg = document.getElementById("leads" + id); svg.innerHTML = "";
        const mid = sector.start + (sector.end - sector.start) / 2, rad = (mid - 90) * (Math.PI / 180);
        const centerX = 170, centerY = 105, r1 = 85;
        const x1 = centerX + r1 * Math.cos(rad), y1 = centerY + r1 * Math.sin(rad);
        let x2 = centerX + 120 * Math.cos(rad), y2 = centerY + 120 * Math.sin(rad);
        if (Math.abs(Math.cos(rad)) < 0.5) x2 = centerX + (x1 >= centerX ? 85 : -85);
        const yLimit = 55;
        if (y2 > centerY + yLimit) y2 = centerY + yLimit;
        if (y2 < centerY - yLimit) y2 = centerY - yLimit;
        const isRight = x1 >= centerX, xLabel = isRight ? 330 : 10;
        const color = (sector.hasNow && sector.amt < sector.cost) ? "#444" : "#FFF";
        const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        line.setAttribute("points", `${x1},${y1} ${x2},${y2} ${xLabel},${y2}`);
        line.setAttribute("stroke", color); line.setAttribute("fill", "none"); 
        line.setAttribute("stroke-dasharray", "3,2"); line.setAttribute("stroke-width", "1.5");
        svg.appendChild(line);
        const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t1.setAttribute("x", xLabel); t1.setAttribute("y", y2 - 4); t1.setAttribute("fill", "#FFF");
        t1.setAttribute("font-size", "12px"); t1.setAttribute("font-weight", "bold"); 
        t1.setAttribute("text-anchor", isRight ? "end" : "start"); t1.textContent = sector.name; svg.appendChild(t1);
        const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t2.setAttribute("x", xLabel); t2.setAttribute("y", y2 + 10); 
        t2.setAttribute("fill", sector.amt >= sector.cost ? "#39FF14" : "#FF003C");
        t2.setAttribute("font-size", "10px"); t2.setAttribute("font-weight", "bold"); 
        t2.setAttribute("text-anchor", isRight ? "end" : "start");
        t2.textContent = `$ ${sector.amt.toLocaleString()}`; svg.appendChild(t2);
        const percStr = `${((sector.amt / sector.total) * 100).toFixed(1)}%`;
        const t3 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t3.setAttribute("x", xLabel); t3.setAttribute("y", y2 + 22); 
        t3.setAttribute("fill", "#888"); t3.setAttribute("font-size", "9px"); t3.setAttribute("font-weight", "bold"); 
        t3.setAttribute("text-anchor", isRight ? "end" : "start"); t3.textContent = percStr; svg.appendChild(t3);
    }

    window.handleListClick = function(id, idx) {
        const sector = ringSectors[id][idx];
        if (sector) activateEdit(id, sector);
    }

    function handleRingClick(e, id) {
        e.stopPropagation();
        const rect = e.target.getBoundingClientRect(), centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
        let angle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI) + 90;
        if (angle < 0) angle += 360;
        const sector = ringSectors[id].find(s => angle >= s.start && angle < s.end);
        if (sector) activateEdit(id, sector);
    }

    function activateEdit(id, sector) {
        drawLead(id, sector);
        document.getElementById("modInput").querySelector('.section').classList.add("edit-active");
        editMode = { active: true, dim: sector.dim, index: sector.idx };
        const isD = !isNaN(Date.parse(sector.dim)) && sector.dim.includes("-");
        setMode(isD ? 'date' : 'tag');
        if (isD) document.getElementById("inputDate").value = sector.dim;
        else document.getElementById("inputTag").value = sector.dim;
        document.getElementById("inputName").value = sector.name;
        document.getElementById("inputAmt").value = sector.cost;
        document.getElementById("inputNow").value = sector.hasNow ? sector.amt : "";
        selectColor(sector.color);
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const activeEl = document.activeElement;
            if (activeEl.tagName === 'INPUT' && activeEl.closest('#modInput')) saveData();
        }
    });

    function saveOrder() { 
        const order = [...document.getElementById('modContainer').querySelectorAll('.draggable-mod')].map(el => el.id);
        localStorage.setItem('windsorModOrder_v3', JSON.stringify(order)); 
    }
    function loadOrder() { 
        const order = JSON.parse(localStorage.getItem('windsorModOrder_v3'));
        if (order) {
            const container = document.getElementById('modContainer');
            order.forEach(id => { const el = document.getElementById(id); if (el) container.appendChild(el); });
        }
    }

    window.switchHub = (n) => { 
        currentHubName = n; localStorage.setItem("windsorActiveHub", n); 
        initHubUI(); 
        document.getElementById("noteArea").value = hubs[n].note || "";
        updateRing("A",""); updateRing("B",""); 
    };
    window.addNewHub = () => { const n = prompt("名稱:"); if (n && !hubs[n]) { hubs[n] = {data:{}, note:""}; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); switchHub(n); } };
    window.editCurrentHubName = () => { const n = prompt("改名:", currentHubName); if (n && !hubs[n]) { hubs[n] = hubs[currentHubName]; delete hubs[currentHubName]; switchHub(n); } };
    window.deleteCurrentHub = () => { if (Object.keys(hubs).length > 1 && confirm("刪除？")) { delete hubs[currentHubName]; switchHub(Object.keys(hubs)[0]); } };
    window.removeItem = (d, i, rid) => { if (confirm("刪除？")) { hubs[currentHubName].data[d].splice(i, 1); if (!hubs[currentHubName].data[d].length) delete hubs[currentHubName].data[d]; localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); refreshSelectors(); updateRing(rid, document.getElementById("sel"+rid).value); } };
    window.deleteDim = (id) => { const d = document.getElementById("sel"+id).value; if (d && confirm("刪除整天？")) { delete hubs[currentHubName].data[d]; refreshSelectors(); updateRing(id, ""); } };
    function refreshSelectors() {
        const dims = Object.keys(hubs[currentHubName].data || {}).sort();
        ["selA", "selB"].forEach(id => {
            const el = document.getElementById(id), cur = el.value;
            el.innerHTML = "<option value=''>選取維度</option>" + dims.map(d => `<option value="${d}">${d}</option>`).join('');
            el.value = hubs[currentHubName].data[cur] ? cur : "";
        });
    }
    function exitEditMode() { editMode = { active: false, dim: null, index: -1 }; document.getElementById("modInput").querySelector('.section').classList.remove("edit-active"); document.getElementById("inputName").value = ""; document.getElementById("inputAmt").value = ""; document.getElementById("inputNow").value = ""; }
    window.clearLeads = () => { document.getElementById("leadsA").innerHTML = ""; document.getElementById("leadsB").innerHTML = ""; exitEditMode(); };
    window.safeEval = (s) => { try { return Function('"use strict"; return (' + s.replace(/[^-()\d/*+.]/g, '') + ')')(); } catch { return 0; } };
    function initHubUI() { document.getElementById("hubSelector").innerHTML = Object.keys(hubs).map(n => `<option value="${n}" ${n===currentHubName?'selected':''}>${n}</option>`).join(''); refreshSelectors(); }
    window.exportData = () => { const s = btoa(unescape(encodeURIComponent(JSON.stringify(hubs)))); const t = document.createElement("textarea"); document.body.appendChild(t); t.value = s; t.select(); document.execCommand("copy"); document.body.removeChild(t); alert("數據複製成功"); };
    window.importData = () => { try { const c = prompt("代碼:"); if (c) { hubs = JSON.parse(decodeURIComponent(escape(atob(c)))); localStorage.setItem("windsorMultiverse", JSON.stringify(hubs)); location.reload(); } } catch { alert("無效代碼"); } };

    window.onload = init;
</script>
</body>
</html>

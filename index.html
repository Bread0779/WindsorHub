<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windsor Hub v3.3</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: white; padding: 15px; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 380px; margin: 0 auto; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { color: #ff8c00; margin: 0; font-size: 20px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,140,0,0.3); }
        .orb-area { background: rgba(255,140,0,0.03); border: 1px solid #222; border-radius: 25px; padding: 20px; margin-bottom: 15px; text-align: center; position: relative; }
        .orb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .orb-id { font-size: 24px; font-weight: 900; color: #ff8c00; text-shadow: 0 0 12px #ff8c00; }
        .time-ctrl { display: flex; background: #222; border: 1px solid #ff8c00; border-radius: 8px; overflow: hidden; width: 140px; }
        .time-select { flex-grow: 1; background: transparent; border: none; color: #ff8c00; padding: 6px; font-size: 11px; outline: none; cursor: pointer; }
        .del-x { background: #333; color: #888; border: none; padding: 5px 10px; font-size: 14px; cursor: pointer; }

        .chart-container { position: relative; width: 260px; height: 260px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
        .donut-ring { position: absolute; width: 180px; height: 180px; border-radius: 50%; background: #222; -webkit-mask: radial-gradient(transparent 40%, black 41%); mask: radial-gradient(transparent 40%, black 41%); z-index: 5; transition: background 0.4s; cursor: pointer; }
        .leadline-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .chart-center { z-index: 6; pointer-events: none; text-align: center; }
        .center-label { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .center-val { font-size: 18px; font-weight: bold; color: #39ff14; text-shadow: 0 0 5px rgba(57, 255, 20, 0.5); }
        
        .detail-list { margin-top: 15px; text-align: left; font-size: 10px; border-top: 1px dashed #333; padding-top: 10px; }
        .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; color: #aaa; border-bottom: 1px solid #1a1a1a; }
        .detail-item b { color: #fff; margin-left: auto; margin-right: 10px; }
        .item-del-btn { background: transparent; color: #ff3131; border: 1px solid #444; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 10px; }

        /* 穩定版日期佈局：鎖死寬度 */
        .section { background: #1a1a1a; padding: 20px; border-radius: 20px; margin: 15px 0; border: 1px solid #ff8c00; box-sizing: border-box; }
        input, select { 
            width: 100%; padding: 12px; background: #262626; border: 1px solid #444; color: white; 
            border-radius: 10px; margin-bottom: 12px; font-family: monospace; font-size: 14px; 
            box-sizing: border-box; display: block; outline: none; -webkit-appearance: none; 
        }
        .main-btn { width: 100%; padding: 15px; background: #ff8c00; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .footer { text-align: center; font-size: 8px; color: #444; margin: 25px 0; }
    </style>
</head>
<body onclick="clearLeads(event)"> <div class="container">
    <header><h2>WINDSOR HUB</h2></header>
    
    <div class="orb-area">
        <div class="orb-header"><span class="orb-id">● A</span>
            <div class="time-ctrl">
                <select class="time-select" id="selA" onchange="window.updateRing('A', this.value)"><option value="">SELECT</option></select>
                <button class="del-x" onclick="window.deleteDate('A')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringA" class="donut-ring" onclick="event.stopPropagation()"></div>
            <svg id="leadsA" class="leadline-layer" viewBox="0 0 260 260"></svg>
            <div class="chart-center"><div class="center-label">TOTAL</div><div id="valA" class="center-val">$ 0</div></div>
        </div>
        <div id="listA" class="detail-list"></div>
    </div>

    <div class="section">
        <input type="date" id="inputDate">
        <input type="text" id="inputName" placeholder="項目名稱">
        <select id="inputCat">
            <option value="travel">旅遊類 (橘)</option>
            <option value="invest">投資類 (藍)</option>
            <option value="reserve">預備金 (灰)</option>
        </select>
        <input type="number" id="inputAmt" placeholder="金額">
        <button class="main-btn" onclick="window.saveData()">數據存儲</button>
    </div>

    <div class="orb-area">
        <div class="orb-header"><span class="orb-id">● B</span>
            <div class="time-ctrl">
                <select class="time-select" id="selB" onchange="window.updateRing('B', this.value)"><option value="">SELECT</option></select>
                <button class="del-x" onclick="window.deleteDate('B')">✕</button>
            </div>
        </div>
        <div class="chart-container">
            <div id="ringB" class="donut-ring" onclick="event.stopPropagation()"></div>
            <svg id="leadsB" class="leadline-layer" viewBox="0 0 260 260"></svg>
            <div class="chart-center"><div class="center-label">TOTAL</div><div id="valB" class="center-val">$ 0</div></div>
        </div>
        <div id="listB" class="detail-list"></div>
    </div>

    <div class="footer">© 2026 WINDSOR SHIELD ANALYTICS<br>v3.3 MASTER STABLE</div>
</div>

<script>
    window.db = JSON.parse(localStorage.getItem("windsorHub_v14") || "{}");
    const colors = { travel: "#ff8c00", invest: "#00f3ff", reserve: "#888" };
    let ringSectors = { A: [], B: [] };

    window.refreshSelectors = function() {
        const dates = Object.keys(window.db).sort();
        ["selA", "selB"].forEach(id => {
            const el = document.getElementById(id);
            const cur = el.value;
            el.innerHTML = "<option value=''>SELECT</option>";
            dates.forEach(d => {
                const opt = document.createElement("option");
                opt.value = d; opt.innerText = d; el.appendChild(opt);
            });
            el.value = window.db[cur] ? cur : "";
        });
    }

    window.saveData = function() {
        const d = document.getElementById("inputDate").value;
        const c = document.getElementById("inputCat").value;
        const n = document.getElementById("inputName").value || "未命名";
        const a = parseFloat(document.getElementById("inputAmt").value) || 0;
        if (!d) { alert("請選擇日期"); return; }
        if (!window.db[d]) window.db[d] = [];
        window.db[d].push({ cat: c, name: n, amt: a });
        localStorage.setItem("windsorHub_v14", JSON.stringify(window.db));
        window.refreshSelectors();
        window.updateRing("A", document.getElementById("selA").value);
        window.updateRing("B", document.getElementById("selB").value);
        alert("數據存儲成功");
    }

    window.removeItem = function(date, index, ringId) {
        if (!confirm("確定移除此筆項目？")) return;
        window.db[date].splice(index, 1);
        if (window.db[date].length === 0) delete window.db[date];
        localStorage.setItem("windsorHub_v14", JSON.stringify(window.db));
        window.refreshSelectors();
        window.updateRing("A", document.getElementById("selA").value);
        window.updateRing("B", document.getElementById("selB").value);
    };

    window.deleteDate = function(id) {
        const d = document.getElementById("sel" + id).value;
        if (!d || !confirm("刪除整個 " + d + " 的數據？")) return;
        delete window.db[d];
        localStorage.setItem("windsorHub_v14", JSON.stringify(window.db));
        window.refreshSelectors();
        window.updateRing("A", ""); window.updateRing("B", "");
    }

    window.updateRing = function(id, date) {
        const valEl = document.getElementById("val" + id);
        const ringEl = document.getElementById("ring" + id);
        const listEl = document.getElementById("list" + id);
        const svgEl = document.getElementById("leads" + id);
        svgEl.innerHTML = "";
        ringSectors[id] = [];
        
        if (window.db[date]) {
            const items = window.db[date];
            const total = items.reduce((sum, i) => sum + i.amt, 0);
            valEl.innerText = "$ " + total.toLocaleString();
            listEl.innerHTML = items.map((i, idx) => `
                <div class="detail-item">
                    <span>${i.name}</span><b>$ ${i.amt.toLocaleString()}</b>
                    <button class="item-del-btn" onclick="removeItem('${date}', ${idx}, '${id}')">✕</button>
                </div>
            `).join('');

            if (total === 0) { ringEl.style.background = "#222"; return; }
            let currentDeg = 0;
            const gapDeg = 1.5; 
            const gps = items.map((i) => {
                const pDeg = (i.amt / total) * 360;
                const s = currentDeg;
                const e = currentDeg + pDeg;
                ringSectors[id].push({ start: s, end: e, name: i.name, amt: i.amt, cat: i.cat });
                currentDeg = e;
                return `${colors[i.cat]} ${s}deg ${e - gapDeg}deg, transparent ${e - gapDeg}deg ${e}deg`;
            });
            ringEl.style.background = `conic-gradient(${gps.join(",")})`;
        } else {
            valEl.innerText = "$ 0";
            ringEl.style.background = "#222";
            listEl.innerHTML = "";
        }
    }

    // 清除所有引線
    window.clearLeads = function() {
        document.getElementById("leadsA").innerHTML = "";
        document.getElementById("leadsB").innerHTML = "";
    }

    function handleRingClick(e, id) {
        e.stopPropagation(); // 防止觸發 body 的點擊清除
        const rect = e.target.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let clickX = e.touches ? e.touches[0].clientX : e.clientX;
        let clickY = e.touches ? e.touches[0].clientY : e.clientY;
        const dx = clickX - centerX, dy = clickY - centerY;
        let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
        if (angle < 0) angle += 360;
        const sector = ringSectors[id].find(s => angle >= s.start && angle < s.end);
        if (sector) drawLeadLine(id, sector);
    }

    function drawLeadLine(id, sector) {
        const svgEl = document.getElementById("leads" + id);
        svgEl.innerHTML = "";
        const midDeg = sector.start + (sector.end - sector.start) / 2;
        const rad = (midDeg - 90) * (Math.PI / 180);
        const ringR = 90, svgC = 130;
        const x1 = svgC + ringR * Math.cos(rad), y1 = svgC + ringR * Math.sin(rad);
        const x2 = svgC + 110 * Math.cos(rad), y2 = svgC + 110 * Math.sin(rad);
        const isR = x2 > svgC, x3 = isR ? svgC + 120 : svgC - 120, y3 = y2;
        const color = colors[sector.cat];

        const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        line.setAttribute("points", `${x1},${y1} ${x2},${y2} ${x3},${y3}`);
        line.setAttribute("stroke", color); line.setAttribute("fill", "none"); line.setAttribute("stroke-dasharray", "2,2");
        svgEl.appendChild(line);

        const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t1.setAttribute("x", x3); t1.setAttribute("y", y3 - 5); t1.setAttribute("fill", color);
        t1.setAttribute("font-size", "10px"); t1.setAttribute("font-weight", "bold");
        t1.setAttribute("text-anchor", isR ? "start" : "end"); t1.textContent = sector.name;
        svgEl.appendChild(t1);

        const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t2.setAttribute("x", x3); t2.setAttribute("y", y3 + 12); t2.setAttribute("fill", "#39ff14");
        t2.setAttribute("font-size", "10px"); t2.setAttribute("text-anchor", isR ? "start" : "end");
        t2.textContent = `$ ${sector.amt.toLocaleString()}`;
        svgEl.appendChild(t2);
    }

    ["ringA", "ringB"].forEach(rid => {
        const el = document.getElementById(rid);
        el.addEventListener("click", (e) => handleRingClick(e, rid.replace("ring", "")));
        el.addEventListener("touchstart", (e) => handleRingClick(e, rid.replace("ring", "")));
    });

    window.refreshSelectors();
</script>
</body>
</html>
